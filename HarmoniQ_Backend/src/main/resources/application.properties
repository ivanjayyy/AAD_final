spring.application.name=HarmoniQ_Backend

#Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/harmoniqdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysql
#connection pool
#spring.datasource.hikari.maximum-pool-size=10

#JPA Configuration
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

#Token Data
jwt.expiration=864000000
jwt.secret=mySecretKey123mySecretKey123mySecretKey123mySecretKey123mySecretKey123