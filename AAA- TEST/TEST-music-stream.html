<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body { background-color: #f8f9fa; color: #333; }
    .cursor-pointer { cursor: pointer; }
    .hover-bg:hover { background-color: #e9ecef !important; }
    .music-card { border: 1px solid #dee2e6; background: #fff; transition: 0.2s; border-radius: 12px; }
    #bottomPlayer.active { bottom: 0 !important; }

    /* Custom styling for the playlist popover */
    .playlist-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .playlist-item:hover { background-color: #f8f9fa; color: #0d6efd; }
    .playlist-item:last-child { border-bottom: none; }
    .popover-body { padding: 0; max-height: 200px; overflow-y: auto; width: 200px; }

    /* Shuffle active state */
    .text-primary-important { color: #0d6efd !important; }
  </style>
</head>

<body class="overflow-x-hidden" style="padding-bottom: 120px;">

<div id="sidebar-sensor" class="position-fixed top-0 start-0 vh-100" style="width: 15px; z-index: 1060;"></div>

<div class="offcanvas offcanvas-start bg-white border-end shadow" tabindex="-1" id="navSidebar" style="width: 280px;">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title text-primary fw-bold">HarmoniQ 🎶</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <ul class="nav flex-column mb-auto">
      <li><a class="nav-link text-dark p-3 fw-medium" href="user-home.html">🏠 Home</a></li>
      <li><a class="nav-link text-dark p-3 fw-medium" href="search-page.html">🔍 Search</a></li>
      <li><a class="nav-link text-dark p-3 fw-medium" href="artists-page.html">🎙️ Artists</a></li>
      <li><a class="nav-link text-dark p-3 fw-medium" href="user-playlists.html">📜 Playlists</a></li>
      <li><a class="nav-link text-dark p-3 fw-medium" href="user-profile.html">👤 Profile</a></li>
    </ul>
    <div class="p-3">
      <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<main class="container py-4">
  <div class="mb-5">
    <h5 class="fw-bold mb-4 text-secondary"><i class="bi bi-clock-history me-2"></i>Recent Music</h5>
    <div class="row g-3" id="recentSongContainer"></div>
  </div>

  <div>
    <h5 class="fw-bold mb-4 text-secondary"><i class="bi bi-music-note-list me-2"></i>All Tracks</h5>
    <div class="row g-3" id="musicContainer"></div>
  </div>
</main>

<div id="bottomPlayer" class="fixed-bottom bg-white border-top py-3 px-4 shadow-lg" style="bottom: -150px; transition: 0.4s ease-in-out; z-index: 1050;">
  <div class="container-fluid">
    <div class="row align-items-center">

      <div class="col-4 col-md-3 d-flex align-items-center">
        <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 50px; height: 50px; object-fit: cover;">
        <div class="overflow-hidden">
          <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
          <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
        </div>
      </div>

      <div class="col-4 col-md-6 text-center">
        <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
          <i id="shuffleBtn" class="bi bi-shuffle fs-5 cursor-pointer text-muted" title="Shuffle" onclick="toggleShuffle()"></i>

          <i class="bi bi-skip-start-fill fs-3 cursor-pointer" onclick="prevSong()"></i>
          <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
          <i class="bi bi-skip-end-fill fs-3 cursor-pointer" onclick="nextSong()"></i>

          <i class="bi bi-repeat fs-5 text-muted invisible"></i>
        </div>
        <div class="d-flex align-items-center gap-2 px-md-5">
          <span id="currentTime" class="text-muted" style="font-size: 11px;">0:00</span>
          <div class="progress flex-grow-1 bg-light border" style="height: 6px; cursor: pointer;" onclick="seek(event)">
            <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
        <i class="bi bi-heart fs-5 cursor-pointer text-muted" title="Like"></i>

        <i class="bi bi-bookmark-plus fs-5 cursor-pointer text-muted"
           id="playlistBtn"
           data-bs-toggle="popover"
           data-bs-trigger="click"
           title="Add to Playlist"></i>

        <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
      </div>

    </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const audio = document.getElementById("audioPlayer");
  const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));

  // Auth Data
  const token = localStorage.getItem("token");
  const payload = token ? JSON.parse(atob(token.split('.')[1])) : { sub: "Guest" };
  const username = payload.sub;

  let musicList = [];
  let shuffledList = [];
  let shuffleMode = false;
  let currentMusicId = null;
  let currentIndex = -1;

  $('#sidebar-sensor').on('mouseenter', () => sidebar.show());

  function fetchMusic() {
    $.ajax({
      url: "http://localhost:8080/api/v1/music/get-all",
      type: "GET",
      success: function(response) {
        musicList = response.data;
        renderList("#musicContainer", musicList);
      }
    });
  }

  function renderList(selector, list) {
    const container = $(selector);
    container.empty();
    list.forEach((music, index) => {
      container.append(`
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="d-flex align-items-center p-2 rounded music-card hover-bg cursor-pointer" onclick="playFromMainList(${index})">
                        <img src="http://localhost:8080/api/v1/music/thumbnail/${music.id}" class="rounded me-3 border" style="width: 45px; height: 45px; object-fit: cover;">
                        <div class="overflow-hidden">
                            <div class="fw-bold text-dark text-truncate small">${music.musicTitle}</div>
                            <div class="text-muted" style="font-size: 11px;">${music.musicArtist}</div>
                        </div>
                    </div>
                </div>
            `);
    });
  }

  // Wrapper to handle clicks from the UI grid
  function playFromMainList(index) {
    if (shuffleMode) {
      // Find the song in the shuffled list so indices remain consistent
      const musicId = musicList[index].id;
      const shuffledIndex = shuffledList.findIndex(m => m.id === musicId);
      playSong(shuffledIndex);
    } else {
      playSong(index);
    }
  }

  function playSong(index) {
    const activeList = shuffleMode ? shuffledList : musicList;
    if (index < 0 || index >= activeList.length) return;

    currentIndex = index;
    const music = activeList[index];
    currentMusicId = music.id;
    audio.src = "http://localhost:8080/api/v1/music/stream/" + music.id;

    $("#playerTitle").text(music.musicTitle);
    $("#playerArtist").text(music.musicArtist);
    $("#playerThumbnail").attr("src", "http://localhost:8080/api/v1/music/thumbnail/" + music.id);

    $("#bottomPlayer").addClass("active");
    audio.play();
    $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill");
  }

  // --- SHUFFLE LOGIC ---
  function toggleShuffle() {
    shuffleMode = !shuffleMode;
    const btn = $("#shuffleBtn");

    if (shuffleMode) {
      btn.addClass("text-primary-important").removeClass("text-muted");
      // Create shuffled copy
      shuffledList = [...musicList].sort(() => Math.random() - 0.5);
      // Sync current index to the new list position
      if (currentMusicId) {
        currentIndex = shuffledList.findIndex(m => m.id === currentMusicId);
      }
    } else {
      btn.removeClass("text-primary-important").addClass("text-muted");
      // Restore index in original list
      if (currentMusicId) {
        currentIndex = musicList.findIndex(m => m.id === currentMusicId);
      }
    }
  }

  function nextSong() {
    const activeList = shuffleMode ? shuffledList : musicList;
    let nextIdx = currentIndex + 1;
    if (nextIdx >= activeList.length) nextIdx = 0;
    playSong(nextIdx);
  }

  function prevSong() {
    const activeList = shuffleMode ? shuffledList : musicList;
    let prevIdx = currentIndex - 1;
    if (prevIdx < 0) prevIdx = activeList.length - 1;
    playSong(prevIdx);
  }

  audio.onended = () => nextSong();

  // Popover Logic
  const playlistPopover = new bootstrap.Popover(document.getElementById('playlistBtn'), {
    html: true,
    sanitize: false,
    content: function() {
      return `<div id="playlistPopoverContent" class="text-center p-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>`;
    }
  });

  document.getElementById('playlistBtn').addEventListener('shown.bs.popover', function () {
    $.ajax({
      url: "http://localhost:8080/api/v1/playlist/load/" + username,
      type: "GET",
      success: function(response) {
        let html = '<div class="list-group list-group-flush">';
        if(!response.data || response.data.length === 0) {
          html += '<div class="p-3 text-muted small">No playlists found</div>';
        } else {
          response.data.forEach(pl => {
            html += `<div class="playlist-item border-bottom" onclick="addToPlaylist(${pl.id})">${pl.playlistName}</div>`;
          });
        }
        html += '</div>';
        const popoverBody = document.querySelector('.popover-body');
        if (popoverBody) popoverBody.innerHTML = html;
      }
    });
  });

  function addToPlaylist(playlistId) {
    if (!currentMusicId) return;
    $.ajax({
      url: "http://localhost:8080/api/v1/playlist-song/add",
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({ playlistId: playlistId, musicId: currentMusicId }),
      success: function() {
        alert("Song added to playlist!");
        bootstrap.Popover.getInstance(document.getElementById('playlistBtn')).hide();
      },
      error: function() {
        alert("Failed to add song.");
      }
    });
  }

  function closePlayer() {
    audio.pause();
    $("#bottomPlayer").removeClass("active");
  }

  $("#playPauseBtn").on("click", () => {
    if(audio.paused) {
      audio.play();
      $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill");
    } else {
      audio.pause();
      $("#playPauseBtn").removeClass("bi-pause-circle-fill").addClass("bi-play-circle-fill");
    }
  });

  audio.ontimeupdate = () => {
    if(audio.duration) {
      let pct = (audio.currentTime / audio.duration) * 100;
      $("#progressBar").css("width", pct + "%");
      let mins = Math.floor(audio.currentTime / 60);
      let secs = Math.floor(audio.currentTime % 60);
      $("#currentTime").text(`${mins}:${secs < 10 ? '0' : ''}${secs}`);
    }
  };

  function seek(e) {
    const percent = e.offsetX / e.currentTarget.offsetWidth;
    audio.currentTime = percent * audio.duration;
  }

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }

  $(document).ready(() => fetchMusic());
</script>

</body>
</html>
