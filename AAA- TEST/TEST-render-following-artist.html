<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .artist-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 15px;
            background: #fff;
        }
        .artist-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bio-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="mb-5">
    <h5 class="fw-bold mb-4 text-secondary"><i class="bi bi-star-half me-2"></i>Following</h5>
    <div class="row g-3" id="followingArtistContainer"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem("token");
    const payload = token ? JSON.parse(atob(token.split('.')[1])) : { sub: "Guest", id: null };
    const userId = payload.id;

    function renderFollowingArtists(artists) {
        const container = $("#followingArtistContainer");
        container.empty();

        artists.forEach(artist => {
            // We stringify the artist object so it can be stored in localStorage
            const artistData = JSON.stringify(artist).replace(/'/g, "&apos;");

            container.append(`
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card h-100 artist-card shadow-sm text-center p-4"
                     style="cursor: pointer;"
                     onclick='viewProfile(${artistData})'>
                    <div class="mb-3">
                        <img src="http://localhost:8080/api/v1/artist/profile-pic/${artist.id}"
                             class="rounded-circle profile-img mx-auto"
                             onerror="this.src='https://via.placeholder.com/150?text=Artist'">
                    </div>
                    <h5 class="fw-bold mb-1">${artist.name}</h5>
                    <p class="bio-text mb-3 px-2">${artist.bio}</p>
                    <div class="mt-auto">
                        <span class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle px-3 py-2">
                             View Profile
                        </span>
                    </div>
                </div>
            </div>
        `);
        });
    }

    function fetchFollowingArtists() {
        $.ajax({
            url: "http://localhost:8080/api/v1/follow-artist/get-all/" + userId,
            type: "GET",
            headers: {
                "Authorization": "Bearer " + localStorage.getItem("token") // Is this line here?
            },
            success: function(response) {
                renderFollowingArtists(response.data);
            }
        });
    }

    $(document).ready(() => {
        fetchFollowingArtists()
    });
</script>
</body>
</html>
