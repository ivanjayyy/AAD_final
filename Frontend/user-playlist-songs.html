<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Playlist Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="css/user-playlist-songs.css">
</head>
<body>

<div class="main-wrapper">
  <div class="content-area">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="user-playlists.html" class="text-decoration-none">My Library</a></li>
            <li class="breadcrumb-item active">Playlist</li>
          </ol>
        </nav>
        <div class="d-flex align-items-center gap-3">
          <h1 id="activePlaylistName" class="fw-bold display-5 mb-0 text-primary">Loading...</h1>
          <button class="btn btn-sm btn-outline-danger border-0 mt-2" onclick="deleteSpecificPlaylist(activePlaylistId)" title="Delete Entire Playlist">
            <i class="bi bi-trash3 fs-4"></i>
          </button>
        </div>
        <p id="songCount" class="text-muted">0 Tracks found</p>
      </div>
      <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" onclick="window.location.href='user-playlists.html'">
        <i class="bi bi-arrow-left me-2"></i>Back
      </button>
    </div>
    <div class="music-container" id="musicContainer"></div>
  </div>

  <div class="right-sidebar shadow-sm">
    <h5 class="fw-bold mb-4 px-2">Your Playlists</h5>
    <div id="sidebarPlaylistList"></div>
  </div>
</div>

<div id="bottomPlayer" class="fixed-bottom bg-white border-top py-3 px-4 shadow-lg" style="bottom: -150px; transition: 0.4s ease-in-out; z-index: 1050;">
  <div class="container-fluid">
    <div class="row align-items-center">
      <div class="col-4 col-md-3 d-flex align-items-center">
        <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 50px; height: 50px; object-fit: cover;">
        <div class="overflow-hidden">
          <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
          <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
        </div>
      </div>
      <div class="col-4 col-md-6 text-center">
        <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
          <i id="shuffleBtn" class="bi bi-shuffle fs-5 cursor-pointer text-muted" onclick="toggleShuffle()"></i>
          <i class="bi bi-skip-start-fill fs-3 cursor-pointer" onclick="prevSong()"></i>
          <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
          <i class="bi bi-skip-end-fill fs-3 cursor-pointer" onclick="nextSong()"></i>
          <i class="bi bi-repeat fs-5 text-muted invisible"></i>
        </div>
        <div class="d-flex align-items-center gap-2 px-md-5">
          <span id="currentTime" class="text-muted" style="font-size: 11px;">0:00</span>
          <div class="progress flex-grow-1 bg-light border" style="height: 6px; cursor: pointer;" onclick="seek(event)">
            <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
        <div class="d-none d-md-flex align-items-center gap-2 me-2">
          <i id="volumeIcon" class="bi bi-volume-up fs-5 text-muted"></i>
          <input type="range" id="volumeSlider" class="form-range" style="width: 80px;" min="0" max="1" step="0.01" value="1">
        </div>

        <i id="likeBtn" class="bi bi-heart fs-5 cursor-pointer text-muted" title="Like" onclick="likeSong()"></i>
        <i class="bi bi-bookmark-dash fs-5 cursor-pointer text-danger" title="Remove from this playlist" onclick="removeFromCurrentPlaylist()"></i>
        <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
      </div>
    </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/user-playlist-songs.js"></script>

</body>
</html>
