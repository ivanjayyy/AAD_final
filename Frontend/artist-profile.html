<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Artist Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="css/artist-profile.css">
</head>
<body>

<div class="profile-header text-center position-relative">
    <a href="" class="back-btn"><i class="bi bi-arrow-left"></i> Back</a>
    <div class="container">
        <img id="artistImg" src="" class="rounded-circle profile-main-img mb-4" onerror="this.src='https://via.placeholder.com/180'">

        <h1 id="artistName" class="display-5 fw-bold">Loading...</h1>

        <div class="d-flex justify-content-center gap-3 mt-3">
            <button class="btn btn-light" onclick="prevArtist()">
                <i class="bi bi-arrow-left"></i> Prev Artist
            </button>

            <p id="artistBio" class="lead opacity-75 mx-auto mb-4" style="max-width: 600px;">Artist Biography...</p>

            <button class="btn btn-light" onclick="nextArtist()">
                Next Artist <i class="bi bi-arrow-right"></i>
            </button>
        </div>

        <button id="followBtn" class="btn btn-outline-light btn-follow" onclick="toggleFollow()">
            <i class="bi bi-person-plus-fill me-2"></i>Follow
        </button>

    </div>
</div>

<main class="container">
    <h4 class="fw-bold mb-4">Popular Tracks</h4>
    <div id="songContainer" class="d-flex flex-column gap-2"></div>
</main>

<div id="bottomPlayer" class="fixed-bottom bg-white border-top py-3 px-4 shadow-lg" style="bottom: -150px; transition: 0.4s ease-in-out; z-index: 1050;">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-4 col-md-3 d-flex align-items-center">
                <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 50px; height: 50px; object-fit: cover;">
                <div class="overflow-hidden">
                    <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
                    <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
                </div>
            </div>
            <div class="col-4 col-md-6 text-center">
                <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
                    <i id="shuffleBtn" class="bi bi-shuffle fs-5 cursor-pointer text-muted" title="Shuffle" onclick="toggleShuffle()"></i>
                    <i class="bi bi-skip-start-fill fs-3 cursor-pointer" onclick="prevSong()"></i>
                    <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
                    <i class="bi bi-skip-end-fill fs-3 cursor-pointer" onclick="nextSong()"></i>
                    <i class="bi bi-repeat fs-5 text-muted invisible"></i>
                </div>
                <div class="d-flex align-items-center gap-2 px-md-5">
                    <span id="currentTime" class="text-muted" style="font-size: 11px;">0:00</span>
                    <div class="progress flex-grow-1 bg-light border" style="height: 6px; cursor: pointer;" onclick="seek(event)">
                        <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
                <div class="d-none d-md-flex align-items-center gap-2 me-2">
                    <i id="volumeIcon" class="bi bi-volume-up fs-5 text-muted"></i>
                    <input type="range" id="volumeSlider" class="form-range" style="width: 80px;" min="0" max="1" step="0.01" value="1">
                </div>

                <i id="likeBtn" class="bi bi-heart fs-5 cursor-pointer text-muted" title="Like" onclick="likeSong()"></i>
                <i class="bi bi-bookmark-plus fs-5 cursor-pointer text-muted" id="playlistBtn" data-bs-toggle="popover" data-bs-trigger="click" title="Add to Playlist"></i>
                <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/artist-profile.js"></script>

</body>
</html>
