<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Email</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>
<div class="container mt-5">
  <h2>Send Email</h2>
  <div class="mb-3">
    <button type="button" class="btn btn-secondary" onclick="goBack()">
      <i class="bi bi-arrow-left me-2"></i> Back
    </button>
  </div>
  <form id="emailForm">
    <div class="mb-3">
      <label for="to" class="form-label">To</label>
      <input type="email" class="form-control" id="to" placeholder="recipient@example.com" required>
    </div>
    <div class="mb-3">
      <label for="subject" class="form-label">Subject</label>
      <input type="text" class="form-control" id="subject" placeholder="Email Subject" required>
    </div>
    <div class="mb-3">
      <label for="body" class="form-label">Body</label>
      <textarea class="form-control" id="body" rows="5" placeholder="Write your email here..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Email</button>
  </form>
  <div id="responseMsg" class="mt-3"></div>
</div>

<script>
  $(document).ready(function() {
    if (localStorage.getItem("token") == null) {
      window.location.href = "sign-in.html";
    }

    $('#to').val(localStorage.getItem("email"))
    localStorage.removeItem("email")

    $('#emailForm').on('submit', function(e) {
      e.preventDefault();

      const emailData = {
        to: $('#to').val(),
        subject: $('#subject').val(),
        body: $('#body').val()
      };

      $('#responseMsg').html('<div class="alert alert-info">Sending email...</div>');

      $.ajax({
        url: 'http://localhost:8080/api/v1/email/send',
        type: 'POST',
        contentType: 'application/json',
        headers: {
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        data: JSON.stringify(emailData),
        success: function(res) {
          $('#responseMsg').html('<div class="alert alert-success">Email sent successfully!</div>');
          $('#emailForm')[0].reset();
          window.location.href = "user-management.html";
        },
        error: function(xhr) {
          let errMsg = 'Failed to send email';
          try {
            const err = JSON.parse(xhr.responseText);
            if (err.message) errMsg = err.message;
          } catch(e) {}
          $('#responseMsg').html('<div class="alert alert-danger">Error: ' + errMsg + '</div>');
        }
      });
    });
  });

  function goBack() {
    window.location.href = "user-management.html";
  }
</script>
</body>
</html>
