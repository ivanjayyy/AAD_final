<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HarmoniQ | Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { background-color: #f8f9fa; color: #212529; }
        .card { border: 1px solid #dee2e6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">

            <div class="card bg-white rounded-3">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary mb-1">HarmoniQ 🎶</h2>
                        <p class="text-muted small">Create your account</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter username">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">OTP</label>

                        <div class="d-flex gap-2">
                            <input type="text" id="otp" class="form-control" placeholder="Enter OTP">

                            <button id="sendOtpBtn" class="btn btn-outline-primary fw-bold" onclick="sendOtp()">
                                Send OTP
                            </button>
                        </div>

                        <small id="otpTimer" class="text-muted"></small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••">
                    </div>

                    <button class="btn btn-primary w-100 fw-bold py-2 mb-3" onclick="validateOtp()">
                        Sign Up
                    </button>

                    <div class="text-center">
                        <small class="text-muted">Already have an account?
                            <a href="sign-in.html" class="text-primary text-decoration-none fw-bold">Sign In</a>
                        </small>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const baseUrl = "http://localhost:8080/api/v1/auth/sign-up";
    let countdown = 60;
    let timerInterval = null;

    function sendOtp() {
        const email = $('#email').val();

        if (!email) {
            alert("Enter email first");
            return;
        }

        // Disable button immediately
        $('#sendOtpBtn').prop('disabled', true);

        // Call backend API (change URL if needed)
        $.ajax({
            url: "http://localhost:8080/api/v1/auth/send-otp",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({ email: email }),
            success: function () {
                alert("OTP sent to your email!");
                startOtpTimer();
            },
            error: function () {
                alert("Failed to send OTP");
                $('#sendOtpBtn').prop('disabled', false);
            }
        });
    }

    function startOtpTimer() {
        countdown = 60;

        $('#otpTimer').text(`Resend available in ${countdown}s`);

        timerInterval = setInterval(() => {
            countdown--;

            $('#otpTimer').text(`Resend available in ${countdown}s`);

            if (countdown <= 0) {
                clearInterval(timerInterval);
                $('#otpTimer').text("");
                $('#sendOtpBtn').prop('disabled', false);
            }
        }, 1000);
    }

    function validateOtp() {
        const otp = $('#otp').val();
        const email = $('#email').val();

        if (!otp || !email) {
            alert("Please enter both OTP and email");
            return false;
        }

        $.ajax({
            url: "http://localhost:8080/api/v1/auth/validate-otp",
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                "email": email,
                "otp": otp
            }),
            success: function (response) {
                console.log("OTP validation successful:", response);
                signUp();
            },
            error: function(error) {
                const msg = error.responseJSON?.message || "OTP validation failed";
                alert(msg);
            }
        });
    }

    function signUp() {
        const username = $('#username').val();
        const password = $('#password').val();
        const email = $('#email').val();
        const role = "USER";

        if (!username || !email || !password) {
            alert("Please fill all fields");
            return;
        }

        $.ajax({
            url: baseUrl,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                "username": username,
                "email": email,
                "password": password,
                "role": role
            }),
            success: function (response) {
                // Adjusting to check standard success patterns
                if (response.status === 200 || response.status === "SUCCESS") {
                    alert("Registration successful!");
                    window.location.href = "sign-in.html";
                }
            },
            error: function(error) {
                const msg = error.responseJSON?.message || "Registration failed";
                alert(msg);
            }
        });
    }
</script>

</body>
</html>
