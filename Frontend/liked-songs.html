<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Liked Songs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body { background-color: #f8f9fa; color: #212529; padding-bottom: 120px; }
        .hero-section {
            background: linear-gradient(135deg, #6610f2 0%, #0d6efd 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: 30px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.4); color: white; }

        #volumeSlider { height: 4px; }
        #volumeSlider::-webkit-slider-thumb { width: 12px; height: 12px; background: #0d6efd; }

        .song-row {
            background: white;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .song-row:hover { background: #f1f3f5; transform: scale(1.01); }
        .song-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }

        #bottomPlayer.active { bottom: 0 !important; }
        .liked { color: #dc3545 !important; }

        /* Popover Styling */
        .playlist-item {
            padding: 8px 12px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .playlist-item:hover { background: #f0f7ff; color: #0d6efd; }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container">
        <div class="mb-4">
            <a href="user-home.html" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
        <div class="d-flex align-items-end gap-4">
            <div class="bg-white p-4 rounded-3 shadow text-primary display-4">
                <i class="bi bi-heart-fill text-danger"></i>
            </div>
            <div>
                <p class="text-uppercase small fw-bold mb-1">Playlist</p>
                <h1 class="display-4 fw-bold mb-0">Liked Songs</h1>
                <p id="songCount" class="opacity-75 mb-0">0 songs</p>
            </div>
        </div>
    </div>
</div>

<main class="container">
    <div class="mb-4">
        <button class="btn btn-primary btn-lg rounded-pill px-5 shadow" onclick="playAll()">
            <i class="bi bi-play-fill"></i> Play All
        </button>
    </div>

    <div class="row fw-bold text-muted small border-bottom pb-2 mb-3 px-3">
        <div class="col-1">#</div>
        <div class="col-6">Title</div>
        <div class="col-4">Artist</div>
        <div class="col-1"></div>
    </div>

    <div id="likedSongsContainer"></div>
</main>

<div id="bottomPlayer" class="fixed-bottom bg-white border-top py-3 px-4 shadow-lg" style="bottom: -150px; transition: 0.4s ease-in-out; z-index: 1050;">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-4 col-md-3 d-flex align-items-center">
                <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 50px; height: 50px; object-fit: cover;">
                <div class="overflow-hidden">
                    <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
                    <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
                </div>
            </div>
            <div class="col-4 col-md-6 text-center">
                <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
                    <i class="bi bi-skip-start-fill fs-3 cursor-pointer" onclick="prevSong()"></i>
                    <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
                    <i class="bi bi-skip-end-fill fs-3 cursor-pointer" onclick="nextSong()"></i>
                </div>
                <div class="progress bg-light border" style="height: 6px; cursor: pointer;" onclick="seek(event)">
                    <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
                </div>
            </div>
            <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
                <div class="d-none d-md-flex align-items-center gap-2 me-2">
                    <i id="volumeIcon" class="bi bi-volume-up fs-5 text-muted"></i>
                    <input type="range" id="volumeSlider" class="form-range" style="width: 80px;" min="0" max="1" step="0.01" value="1">
                </div>

                <i id="likeBtn" class="bi bi-heart-fill fs-5 cursor-pointer text-danger liked" onclick="likeSong()"></i>

                <i class="bi bi-bookmark-plus fs-5 cursor-pointer text-muted" id="playlistBtn" data-bs-toggle="popover" data-bs-trigger="click" title="Add to Playlist"></i>

                <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const apiBase = "http://localhost:8080/api/v1";
    const audio = document.getElementById("audioPlayer");
    const token = localStorage.getItem("token");
    const payload = token ? JSON.parse(atob(token.split('.')[1])) : { id: null, sub: "Guest" };
    const userId = payload.id;
    const username = payload.sub; // Needed for playlist loading

    let likedSongs = [];
    let currentIndex = -1;

    $.ajaxSetup({
        beforeSend: function(xhr) {
            if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
    });

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") {
            window.location.href = "user-home.html";
            return;
        }
    });

    $(document).ready(function() {
        if (localStorage.getItem("token") == null) {
            window.location.href = "sign-in.html";
            return;
        }

        fetchLikedSongs();
        initPlaylistPopover();
    });

    function fetchLikedSongs() {
        $.get(`${apiBase}/liked-song/get-by-user/${userId}`, (response) => {
            likedSongs = response.data || [];
            $("#songCount").text(`${likedSongs.length} songs`);
            renderSongs();
        });
    }

    // --- PLAYLIST FEATURE LOGIC ---
    function initPlaylistPopover() {
        const playlistBtn = document.getElementById('playlistBtn');
        const popover = new bootstrap.Popover(playlistBtn, {
            html: true,
            sanitize: false,
            content: function() {
                return `<div id="playlistPopoverContent" class="text-center p-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>`;
            }
        });

        playlistBtn.addEventListener('shown.bs.popover', function () {
            $.get(`${apiBase}/playlist/load/${userId}`, (response) => {
                let html = '<div class="list-group list-group-flush" style="width: 200px; max-height: 200px; overflow-y: auto;">';
                if(!response.data || response.data.length === 0) {
                    html += '<div class="p-2 text-muted small">No playlists found</div>';
                } else {
                    response.data.forEach(pl => {
                        html += `<div class="playlist-item" onclick="addToPlaylist(${pl.id})">${pl.playlistName}</div>`;
                    });
                }
                html += '</div>';
                const popoverBody = document.querySelector('.popover-body');
                if (popoverBody) popoverBody.innerHTML = html;
            });
        });
    }

    function addToPlaylist(playlistId) {
        if (currentIndex === -1) {
            alert("Please play a song first!");
            return;
        }
        const musicId = likedSongs[currentIndex].id;

        $.ajax({
            url: `${apiBase}/playlist-song/add`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ playlistId: playlistId, musicId: musicId }),
            success: function() {
                alert("Added to playlist! 🎶");
                bootstrap.Popover.getInstance(document.getElementById('playlistBtn')).hide();
            },
            error: function() {
                alert("Failed to add song. It might already be in the playlist.");
            }
        });
    }

    // --- VOLUME & PLAYER LOGIC ---
    $('#volumeSlider').on('input', function() {
        const vol = $(this).val();
        audio.volume = vol;
        const icon = $('#volumeIcon');
        if (vol == 0) icon.removeClass('bi-volume-up bi-volume-down').addClass('bi-volume-mute');
        else if (vol < 0.5) icon.removeClass('bi-volume-up bi-volume-mute').addClass('bi-volume-down');
        else icon.removeClass('bi-volume-down bi-volume-mute').addClass('bi-volume-up');
    });

    function renderSongs() {
        const container = $("#likedSongsContainer");
        container.empty();
        if(likedSongs.length === 0) {
            container.html('<div class="text-center py-5 text-muted">You haven\'t liked any songs yet.</div>');
            return;
        }
        likedSongs.forEach((song, index) => {
            container.append(`
                <div class="song-row d-flex align-items-center p-3 mb-2" onclick="playSong(${index})">
                    <div class="col-1 text-muted">${index + 1}</div>
                    <div class="col-6 d-flex align-items-center">
                        <img src="${apiBase}/music/thumbnail/${song.id}" class="song-img me-3">
                        <span class="fw-bold">${song.musicTitle}</span>
                    </div>
                    <div class="col-4 text-muted">${song.musicArtist}</div>
                    <div class="col-1 text-end text-primary fs-5">
                        <i class="bi bi-play-circle-fill"></i>
                    </div>
                </div>
            `);
        });
    }

    function playSong(index) {
        if (index < 0 || index >= likedSongs.length) return;
        currentIndex = index;
        const song = likedSongs[index];

        audio.src = `${apiBase}/music/stream/${song.id}`;
        $("#playerTitle").text(song.musicTitle);
        $("#playerArtist").text(song.musicArtist);
        $("#playerThumbnail").attr("src", `${apiBase}/music/thumbnail/${song.id}`);

        $("#bottomPlayer").addClass("active");
        audio.play();
        $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill");
    }

    function playAll() { if (likedSongs.length > 0) playSong(0); }
    function nextSong() { playSong((currentIndex + 1) % likedSongs.length); }
    function prevSong() { playSong((currentIndex - 1 + likedSongs.length) % likedSongs.length); }

    function likeSong() {
        if (currentIndex === -1) return;
        const musicId = likedSongs[currentIndex].id;
        $.ajax({
            url: `${apiBase}/liked-song/add-or-remove`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ userId: userId, musicId: musicId }),
            success: function() {
                fetchLikedSongs();
                closePlayer();
            }
        });
    }

    $("#playPauseBtn").on("click", () => {
        if(audio.paused) { audio.play(); $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill"); }
        else { audio.pause(); $("#playPauseBtn").removeClass("bi-pause-circle-fill").addClass("bi-play-circle-fill"); }
    });

    audio.ontimeupdate = () => {
        if(audio.duration) {
            let pct = (audio.currentTime / audio.duration) * 100;
            $("#progressBar").css("width", pct + "%");
        }
    };

    function seek(e) {
        const percent = e.offsetX / e.currentTarget.offsetWidth;
        audio.currentTime = percent * audio.duration;
    }

    function closePlayer() { audio.pause(); $("#bottomPlayer").removeClass("active"); }
    audio.onended = () => nextSong();
</script>
</body>
</html>
