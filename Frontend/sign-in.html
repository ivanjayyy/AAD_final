<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HarmoniQ | Sign In</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="css/sign-in.css">
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">

      <div class="card bg-white rounded-3">
        <div class="card-body p-4 p-md-5 text-center">

          <div class="mb-4">
            <h2 class="fw-bold text-primary mb-1">HarmoniQ 🎧</h2>
            <p class="text-muted small">Sign in to your account</p>
          </div>

          <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-secondary">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username">
          </div>

          <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-secondary">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
          </div>

          <button class="btn btn-primary w-100 fw-bold py-2 mb-3" onclick="signIn()">
            Sign In
          </button>

          <div class="mt-2">
            <small class="text-muted">New here?
              <a href="sign-up.html" class="text-primary text-decoration-none fw-bold">Create an account</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/sign-in.js"></script>
</body>
</html>
