<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="css/search-page.css">
</head>
<body>

<div id="sidebar-sensor" class="position-fixed top-0 start-0 vh-100 sidebar-sensor"></div>

<div class="offcanvas offcanvas-start bg-white border-end shadow" tabindex="-1" id="navSidebar" style="width: 280px;">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title text-primary fw-bold">HarmoniQ 🎶</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
        <ul class="nav flex-column mb-auto">
            <li><a class="nav-link text-dark p-3 fw-medium" href="user-home.html">🏠 Home</a></li>
            <li><a class="nav-link text-dark p-3 fw-medium" href="search-page.html">🔍 Search</a></li>
            <li><a class="nav-link text-dark p-3 fw-medium" href="artists-page.html">🎙️ Artists</a></li>
            <li><a class="nav-link text-dark p-3 fw-medium" href="user-playlists.html">📜 Playlists</a></li>
            <li><a class="nav-link text-dark p-3 fw-medium" href="user-profile.html">👤 Profile</a></li>
        </ul>
        <div class="p-3 border-top">
            <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<header class="search-header sticky-top shadow-sm">
    <div class="container">
        <div class="position-relative">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="mainSearch" class="form-control search-input-lg" placeholder="What do you want to listen to?" autofocus>
        </div>
    </div>
</header>

<main class="container py-4">
    <div id="emptyPrompt" class="empty-state">
        <i class="bi bi-search" style="font-size: 3rem;"></i>
        <p class="mt-3 fs-5">Find your next favorite song or artist</p>
    </div>

    <section id="artistSection" style="display: none;" class="mb-5">
        <h6 class="section-title">Artists</h6>
        <div class="row g-4" id="artistResults"></div>
    </section>

    <section id="songSection" style="display: none;">
        <h6 class="section-title">Songs</h6>
        <div id="songResults"></div>
    </section>

    <div id="noResults" class="empty-state" style="display: none;">
        <i class="bi bi-exclamation-circle" style="font-size: 2rem;"></i>
        <p class="mt-2">We couldn't find anything for that search.</p>
    </div>
</main>

<div id="bottomPlayer" class="fixed-bottom bg-white border-top py-3 px-4 shadow-lg" style="bottom: -150px; transition: 0.4s ease-in-out; z-index: 1050;">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-4 col-md-3 d-flex align-items-center">
                <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 50px; height: 50px; object-fit: cover;">
                <div class="overflow-hidden">
                    <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
                    <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
                </div>
            </div>
            <div class="col-4 col-md-6 text-center">
                <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
                    <i class="bi bi-skip-start-fill fs-3 cursor-pointer"></i>
                    <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
                    <i class="bi bi-skip-end-fill fs-3 cursor-pointer"></i>
                </div>
                <div class="d-flex align-items-center gap-2 px-md-5">
                    <span id="currentTime" class="text-muted" style="font-size: 11px;">0:00</span>
                    <div class="progress flex-grow-1 bg-light border" style="height: 6px; cursor: pointer;" onclick="seek(event)">
                        <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
                <div class="d-none d-md-flex align-items-center gap-2 me-2">
                    <i id="volumeIcon" class="bi bi-volume-up fs-5 text-muted"></i>
                    <input type="range" id="volumeSlider" class="form-range" style="width: 80px;" min="0" max="1" step="0.01" value="1">
                </div>

                <i id="likeBtn" class="bi bi-heart fs-5 cursor-pointer text-muted" title="Like" onclick="likeSong()"></i>

                <i class="bi bi-bookmark-plus fs-5 cursor-pointer text-muted" id="playlistBtn" data-bs-toggle="popover" data-bs-trigger="click" title="Add to Playlist"></i>
                <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/search-page.js"></script>
</body>
</html>
