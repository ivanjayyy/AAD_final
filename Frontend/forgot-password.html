<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4" style="width: 350px;">
    <h5 class="mb-3 text-center">Reset Password</h5>

    <!-- Email -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Enter your email">

    <small id="otpTimer" class="text-muted"></small>

    <button id="sendOtpBtn" class="btn btn-outline-primary w-100 mb-3" onclick="sendResetOtp()">
        Send Reset OTP
    </button>

    <hr>

    <input type="text" id="otp" class="form-control mb-3" placeholder="OTP">

    <!-- New Username -->
    <input type="text" id="newUsername" class="form-control mb-3" placeholder="New Username">

    <!-- New Password -->
    <input type="password" id="newPassword" class="form-control mb-3" placeholder="New Password">

    <button class="btn btn-primary w-100" onclick="validateOtp()">
        Submit Reset
    </button>

    <div class="text-center mt-3">
        <a href="sign-in.html">Back to Sign In</a>
    </div>
</div>

<script src="js/forgot-password.js"></script>

</body>
</html>
