<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Profile Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="css/user-profile.css">
</head>
<body>

<div id="sidebar-sensor"></div>

<div class="offcanvas offcanvas-start sidebar-light" tabindex="-1" id="navSidebar" style="width: 280px;">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title fw-bold text-primary">HarmoniQ <span id="navRoleLabel"></span></h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <ul class="nav flex-column mb-auto" id="dynamicNavLinks">
    </ul>
    <div class="p-3 border-top mt-auto">
      <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12 col-xl-10 mx-auto">

        <h2 class="fw-bold mb-4">Account Settings</h2>

        <div class="row g-4">
          <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4">
              <div class="mb-3">
                <div class="profile-upload-container" onclick="$('#userProfilePicInput').click()">

                  <div class="profile-preview-wrapper" style="width: 100px; height: 100px;">
                    <img id="userProfilePreview"
                         src=""
                         alt="Profile"
                         onerror="this.src=defaultProfileSVG">
                  </div>

                  <div class="edit-icon-badge">
                    <i class="bi bi-camera-fill"></i>
                  </div>
                </div>

                <input type="file" id="userProfilePicInput" class="d-none"
                       accept="image/*"
                       onchange="handleUserProfilePreview(this)">
              </div>
              <h5 id="displayUsername" class="fw-bold mb-1">---</h5>
              <p id="displayEmail" class="text-muted small">---</p>
              <span class="badge bg-light text-primary border border-primary px-3 py-2 mt-2" id="displayRole">---</span>
            </div>
          </div>

          <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
              <h6 class="fw-bold mb-4 border-bottom pb-2">Personal Information</h6>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold">Username</label>
                  <input type="text" id="username" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold">Role</label>
                  <input type="text" id="role" class="form-control bg-light" readonly>
                </div>
                <div class="col-12 mb-4">
                  <label class="form-label small fw-bold">Email Address</label>
                  <input type="email" id="email" class="form-control">
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center border-top pt-4 mt-2">
                <button class="btn btn-danger btn-sm px-3" onclick="deleteAccount()">
                  <i class="bi bi-trash me-2"></i>Delete Account
                </button>
                <button id="update-user" class="btn btn-primary px-4 fw-bold" onclick="getUserEmail()">
                  Save Changes
                </button>
                <small id="otpTimer" class="text-muted"></small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OTP Modal -->
<div class="modal fade" id="otpModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">Verify OTP</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">

        <p class="text-muted small">Enter the OTP sent to your email</p>

        <input type="text"
               id="otpInput"
               class="form-control text-center fw-bold"
               maxlength="6"
               placeholder="Enter OTP"
               style="letter-spacing: 5px; font-size: 20px;">

      </div>

      <div class="modal-footer justify-content-center">
        <button class="btn btn-primary px-4 fw-bold" onclick="verifyOtp()">
          Verify OTP
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/user-profile.js"></script>

</body>
</html>
