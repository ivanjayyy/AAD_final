<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Profile Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body { background-color: #f4f7f6; color: #333; }
    .main-content { transition: margin-left 0.3s; padding: 40px; }
    .cursor-pointer { cursor: pointer; }

    /* Sidebar sensor */
    #sidebar-sensor {
      position: fixed;
      top: 0; left: 0;
      width: 15px; height: 100vh;
      z-index: 1050;
    }

    /* Sidebar Styling */
    .sidebar-light {
      background: #ffffff !important;
      border-right: 1px solid #dee2e6;
    }
    .sidebar-light .nav-link {
      color: #555;
      padding: 12px 20px;
      border-bottom: 1px solid #f8f9fa;
      transition: 0.2s;
    }
    .sidebar-light .nav-link:hover {
      background-color: #f8f9fa;
      color: #0d6efd;
    }
    .sidebar-light .active-nav {
      background-color: #eef5ff;
      color: #0d6efd !important;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="sidebar-sensor"></div>

<div class="offcanvas offcanvas-start sidebar-light" tabindex="-1" id="navSidebar" style="width: 280px;">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title fw-bold text-primary">HarmoniQ <span id="navRoleLabel"></span></h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <ul class="nav flex-column mb-auto" id="dynamicNavLinks">
    </ul>
    <div class="p-3 border-top mt-auto">
      <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12 col-xl-10 mx-auto">

        <h2 class="fw-bold mb-4">Account Settings</h2>

        <div class="row g-4">
          <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4">
              <div class="mb-3">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 2rem;">
                  <i class="bi bi-person"></i>
                </div>
              </div>
              <h5 id="displayUsername" class="fw-bold mb-1">---</h5>
              <p id="displayEmail" class="text-muted small">---</p>
              <span class="badge bg-light text-primary border border-primary px-3 py-2 mt-2" id="displayRole">---</span>
            </div>
          </div>

          <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
              <h6 class="fw-bold mb-4 border-bottom pb-2">Personal Information</h6>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold">Username</label>
                  <input type="text" id="username" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold">Role</label>
                  <input type="text" id="role" class="form-control bg-light" readonly>
                </div>
                <div class="col-12 mb-4">
                  <label class="form-label small fw-bold">Email Address</label>
                  <input type="email" id="email" class="form-control">
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center border-top pt-4 mt-2">
                <button class="btn btn-danger btn-sm px-3" onclick="deleteAccount()">
                  <i class="bi bi-trash me-2"></i>Delete Account
                </button>
                <button class="btn btn-primary px-4 fw-bold" onclick="updateUser()">
                  Save Changes
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const token = localStorage.getItem("token");
  const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));

  if(!token) {
    window.location.href="signin.html";
  }

  // Parse Token
  const payload = JSON.parse(atob(token.split('.')[1]));
  const userId = payload.id;
  const userRole = payload.role; // Ensure your backend includes 'role' in JWT payload

  // Initialize Sidebar Hover
  $('#sidebar-sensor').on('mouseenter', () => sidebar.show());

  function setupNavbar() {
    const navContainer = $("#dynamicNavLinks");
    navContainer.empty();

    if (userRole === "ADMIN") {
      $("#navRoleLabel").text("Admin 🛠️");
      navContainer.append(`
        <li><a href="admin-dashboard.html" class="nav-link p-3 text-primary fw-bold bg-light rounded"><i class="bi bi-speedometer2 me-3"></i> Dashboard</a></li>
        <li><a href="music-management.html" class="nav-link p-3 text-dark"><i class="bi bi-music-note-beamed me-3"></i> Music Management</a></li>
        <li><a href="artist-management.html" class="nav-link p-3 text-dark"><i class="bi bi-mic me-3"></i> Artists</a></li>
        <li><a href="user-management.html" class="nav-link p-3 text-dark"><i class="bi bi-people me-3"></i> User Directory</a></li>
        <li><a href="user-profile.html" class="nav-link p-3 text-dark"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
      `);
    } else {
      $("#navRoleLabel").text("User 🎶");
      navContainer.append(`
        <li><a class="nav-link" href="user-home.html">🏠 Home</a></li>
        <li><a class="nav-link" href="search-page.html">🔍 Search</a></li>
        <li><a class="nav-link" href="artists-page.html">🎙️ Artists</a></li>
        <li><a class="nav-link" href="user-playlists.html">📜 Playlists</a></li>
        <li><a class="nav-link active-nav" href="user-profile.html">👤 Profile</a></li>
      `);
    }
  }

  function loadUser() {
    $.ajax({
      url: `http://localhost:8080/api/v1/user/get/${userId}`,
      type: "GET",
      headers: { "Authorization": "Bearer " + token },
      success: function(response) {
        const user = response.data;
        $("#username").val(user.username);
        $("#email").val(user.email);
        $("#role").val(user.role);

        $("#displayUsername").text(user.username);
        $("#displayEmail").text(user.email);
        $("#displayRole").text(user.role);
      },
      error: () => {
        alert("Session expired. Please login again.");
        logout();
      }
    });
  }

  function updateUser() {
    const updateData = {
      id: userId,
      username: $("#username").val(),
      email: $("#email").val(),
      role: $("#role").val()
    };

    $.ajax({
      url: "http://localhost:8080/api/v1/user/update",
      type: "PUT",
      headers: { "Authorization": "Bearer " + token },
      contentType: "application/json",
      data: JSON.stringify(updateData),
      success: function() {
        alert("Profile Updated Successfully!");
        loadUser();
      },
      error: (xhr) => {
        const msg = xhr.responseJSON ? xhr.responseJSON.message : "Update failed";
        alert(msg);
      }
    });
  }

  function deleteAccount() {
    if(!confirm("Are you sure? This will permanently delete your account and all data.")) return;
    $.ajax({
      url: "http://localhost:8080/api/v1/user/delete/" + userId,
      type: "DELETE",
      headers: { "Authorization": "Bearer " + token },
      success: function() {
        alert("Account deleted.");
        logout();
      }
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = "sign-in.html";
  }

  $(document).ready(() => {
    setupNavbar();
    loadUser();
  });
</script>

</body>
</html>
