<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Profile Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    /* Theme Variables */
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #212529;
      --text-muted: #6c757d;
      --primary-accent: #0d6efd;
      --border-color: #dee2e6;
      --nav-hover: #f1f3f5;
    }

    [data-theme="dark"] {
      --bg-color: #000000;
      --card-bg: #121212;
      --text-main: #ffffff;
      --text-muted: #b0b0b0;
      --primary-accent: #d63384;
      --border-color: #333333;
      --nav-hover: #1e1e1e;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s, color 0.3s;
      padding: 40px;
    }

    .card {
      background-color: var(--card-bg) !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-main);
      border-radius: 16px;
    }

    /* Sidebar & Nav */
    .sidebar-sensor { position: fixed; top: 0; left: 0; width: 15px; height: 100vh; z-index: 1050; cursor: pointer; }
    .offcanvas { background-color: var(--card-bg) !important; color: var(--text-main); border-right: 1px solid var(--border-color) !important; }
    .nav-link { color: var(--text-main) !important; transition: 0.2s; border-radius: 8px; margin: 4px 10px; }
    .nav-link:hover { background-color: var(--nav-hover); color: var(--primary-accent) !important; }
    .active-nav { background-color: var(--nav-hover); color: var(--primary-accent) !important; font-weight: bold; }

    /* Inputs */
    .form-control {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    .form-control:focus { background-color: var(--bg-color); color: var(--text-main); border-color: var(--primary-accent); box-shadow: none; }
    .form-control[readonly] { opacity: 0.6; }

    /* Profile Avatar */
    .avatar-circle {
      width: 80px; height: 80px;
      background: linear-gradient(45deg, var(--primary-accent), #712cf9);
      color: white; font-size: 2rem;
      border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #theme-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      padding: 8px 15px; border-radius: 50px; border: none;
      background: var(--primary-accent); color: white; font-weight: bold;
    }

    .text-primary { color: var(--primary-accent) !important; }
    .btn-primary { background-color: var(--primary-accent); border-color: var(--primary-accent); }
    .badge-role { border: 1px solid var(--primary-accent); color: var(--primary-accent); }
  </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
<div id="sidebar-sensor" class="sidebar-sensor"></div>

<div class="offcanvas offcanvas-start shadow" tabindex="-1" id="navSidebar" style="width: 280px;">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title fw-bold text-primary">HarmoniQ <span id="navRoleLabel"></span></h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" id="closeSidebarBtn"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0 pt-3">
    <ul class="nav flex-column mb-auto" id="dynamicNavLinks">
    </ul>
    <div class="p-3 border-top mt-auto">
      <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="row">
    <div class="col-12 col-xl-10 mx-auto">
      <h2 class="fw-bold mb-4">Account Settings</h2>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card shadow-sm text-center p-4 h-100">
            <div class="mb-3">
              <div class="avatar-circle">
                <i class="bi bi-person"></i>
              </div>
            </div>
            <h5 id="displayUsername" class="fw-bold mb-1">---</h5>
            <p id="displayEmail" class="text-muted small">---</p>
            <div class="mt-2">
              <span class="badge badge-role px-3 py-2 rounded-pill" id="displayRole">---</span>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card shadow-sm p-4 h-100">
            <h6 class="fw-bold mb-4 border-bottom pb-2">Personal Information</h6>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold text-muted">Username</label>
                <input type="text" id="username" class="form-control py-2">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold text-muted">Account Role</label>
                <input type="text" id="role" class="form-control py-2" readonly>
              </div>
              <div class="col-12 mb-4">
                <label class="form-label small fw-bold text-muted">Email Address</label>
                <input type="email" id="email" class="form-control py-2">
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-4 mt-2">
              <button class="btn btn-outline-danger btn-sm px-3 border-0" onclick="deleteAccount()">
                <i class="bi bi-trash me-2"></i>Delete Account
              </button>
              <button class="btn btn-primary px-4 fw-bold rounded-pill" onclick="updateUser()">
                Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // --- Theme Control ---
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const btn = document.getElementById('theme-toggle');
    btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    const closeBtn = document.getElementById('closeSidebarBtn');
    if(theme === 'dark') closeBtn?.classList.add('btn-close-white');
    else closeBtn?.classList.remove('btn-close-white');
  }

  function toggleTheme() {
    applyTheme(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark');
  }

  (function() { applyTheme(localStorage.getItem('theme') || 'light'); })();

  // --- Auth & API ---
  const token = localStorage.getItem("token");
  const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));

  if(!token) window.location.href="sign-in.html";

  const payload = JSON.parse(atob(token.split('.')[1]));
  const userId = payload.id;
  const userRole = payload.role;

  $('#sidebar-sensor').on('mouseenter', () => sidebar.show());

  function setupNavbar() {
    const navContainer = $("#dynamicNavLinks");
    navContainer.empty();

    if (userRole === "ADMIN") {
      $("#navRoleLabel").text("HQ 🛠️");
      navContainer.append(`
        <li><a href="admin-dashboard.html" class="nav-link p-3"><i class="bi bi-speedometer2 me-3"></i> Dashboard</a></li>
        <li><a href="music-management.html" class="nav-link p-3"><i class="bi bi-music-note-beamed me-3"></i> Music</a></li>
        <li><a href="artist-management.html" class="nav-link p-3"><i class="bi bi-mic me-3"></i> Artists</a></li>
        <li><a href="user-management.html" class="nav-link p-3"><i class="bi bi-people me-3"></i> User Directory</a></li>
        <li><a href="user-profile.html" class="nav-link p-3 active-nav"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
      `);
    } else {
      $("#navRoleLabel").text("🎶");
      navContainer.append(`
        <li><a class="nav-link p-3" href="user-home.html"><i class="bi bi-house me-3"></i> Home</a></li>
        <li><a class="nav-link p-3" href="search-page.html"><i class="bi bi-search me-3"></i> Search</a></li>
        <li><a class="nav-link p-3" href="artists-page.html"><i class="bi bi-mic me-3"></i> Artists</a></li>
        <li><a class="nav-link p-3" href="user-playlists.html"><i class="bi bi-music-note-list me-3"></i> Playlists</a></li>
        <li><a class="nav-link p-3 active-nav" href="user-profile.html"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
      `);
    }
  }

  function loadUser() {
    $.ajax({
      url: `http://localhost:8080/api/v1/user/get/${userId}`,
      type: "GET",
      headers: { "Authorization": "Bearer " + token },
      success: function(response) {
        const user = response.data;
        $("#username").val(user.username);
        $("#email").val(user.email);
        $("#role").val(user.role);

        $("#displayUsername").text(user.username);
        $("#displayEmail").text(user.email);
        $("#displayRole").text(user.role);
      }
    });
  }

  function updateUser() {
    const updateData = {
      id: userId,
      username: $("#username").val(),
      email: $("#email").val(),
      role: $("#role").val()
    };

    $.ajax({
      url: "http://localhost:8080/api/v1/user/update",
      type: "PUT",
      headers: { "Authorization": "Bearer " + token },
      contentType: "application/json",
      data: JSON.stringify(updateData),
      success: function() {
        alert("Profile Updated Successfully!");
        loadUser();
      }
    });
  }

  function deleteAccount() {
    if(!confirm("Warning: This action is permanent. Delete your HarmoniQ account?")) return;
    $.ajax({
      url: "http://localhost:8080/api/v1/user/delete/" + userId,
      type: "DELETE",
      headers: { "Authorization": "Bearer " + token },
      success: function() {
        alert("Account deleted.");
        logout();
      }
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = "sign-in.html";
  }

  $(document).ready(() => {
    setupNavbar();
    loadUser();
  });
</script>

</body>
</html>
