<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Profile Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    :root {
      --hq-primary: #0d6efd;
      --hq-danger: #ef4444;
      --hq-bg: #f8fafc;
    }

    body { background-color: var(--hq-bg); color: #1e293b; font-family: 'Inter', system-ui, sans-serif; }

    /* Sidebar Sensor & Logic */
    #sidebar-sensor { position: fixed; top: 0; left: 0; width: 12px; height: 100vh; z-index: 1050; }
    .sidebar-custom { border: none; box-shadow: 10px 0 30px rgba(0,0,0,0.04); }

    .nav-link {
      padding: 14px 24px !important;
      color: #64748b !important;
      font-weight: 500;
      transition: 0.3s;
      border-radius: 12px;
      margin: 4px 12px;
    }
    .nav-link:hover { background: #f1f5f9; color: var(--hq-primary) !important; }
    .active-nav { background: #e0e7ff !important; color: var(--hq-primary) !important; font-weight: 700; }

    /* Profile Cards */
    .settings-card {
      border: none;
      border-radius: 24px;
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .avatar-placeholder {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .form-label { color: #475569; letter-spacing: 0.5px; }
    .form-control {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      background-color: #fcfcfc;
    }
    .form-control:focus { border-color: var(--hq-primary); box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }
  </style>
</head>
<body>

<div id="sidebar-sensor"></div>

<div class="offcanvas offcanvas-start sidebar-custom" tabindex="-1" id="navSidebar" style="width: 280px;">
  <div class="offcanvas-header py-4 px-4">
    <h5 class="offcanvas-title fw-bold text-primary d-flex align-items-center">
      <i class="bi bi-music-note-beamed me-2 fs-3"></i> HarmoniQ <small class="ms-2 opacity-50 fw-normal" id="navRoleLabel"></small>
    </h5>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <ul class="nav flex-column mb-auto" id="dynamicNavLinks">
    </ul>
    <div class="p-4 border-top">
      <button class="btn btn-outline-danger w-100 fw-bold py-2" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="d-flex align-items-center justify-content-between mb-5">
          <div>
            <h1 class="fw-bold mb-1">Account Settings</h1>
            <p class="text-muted">Manage your personal identity and security</p>
          </div>
          <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill" id="displayRoleBadge">USER</span>
        </div>

        <div class="row g-4">
          <div class="col-md-4">
            <div class="settings-card text-center p-5">
              <div class="avatar-placeholder rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" id="avatarCircle">
                ?
              </div>
              <h4 id="displayUsername" class="fw-bold mb-1">---</h4>
              <p id="displayEmail" class="text-muted small mb-0">---</p>

              <div class="mt-4 pt-4 border-top">
                <div class="row text-center">
                  <div class="col-6 border-end">
                    <div class="fw-bold text-primary">12</div>
                    <div class="small text-muted">Playlists</div>
                  </div>
                  <div class="col-6">
                    <div class="fw-bold text-primary">154</div>
                    <div class="small text-muted">Liked</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-8">
            <div class="settings-card p-5">
              <h5 class="fw-bold mb-4 d-flex align-items-center">
                <i class="bi bi-shield-check text-primary me-2"></i> Profile Details
              </h5>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold text-uppercase">Username</label>
                  <input type="text" id="username" class="form-control" placeholder="Choose a name">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-bold text-uppercase">Account Level</label>
                  <input type="text" id="role" class="form-control bg-light opacity-75" readonly>
                </div>
                <div class="col-12 mb-4">
                  <label class="form-label small fw-bold text-uppercase">Email Address</label>
                  <input type="email" id="email" class="form-control" placeholder="name@example.com">
                </div>
              </div>

              <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3 mt-4 pt-4 border-top">
                <button class="btn btn-link text-danger fw-bold text-decoration-none p-0" onclick="deleteAccount()">
                  <i class="bi bi-trash3 me-2"></i>Delete My Account
                </button>
                <button class="btn btn-primary px-5 py-3 fw-bold shadow-sm" style="border-radius: 14px;" onclick="updateUser()">
                  Update Profile
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const token = localStorage.getItem("token");
  const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));

  // Global Auth Config
  $.ajaxSetup({
    headers: { 'Authorization': "Bearer " + token }
  });

  if(!token) window.location.href="sign-in.html";

  // Parse Token safely
  let payload = {};
  try {
    payload = JSON.parse(atob(token.split('.')[1]));
  } catch(e) { logout(); }

  const userId = payload.id;
  const userRole = payload.role; // Assuming role is in JWT

  $('#sidebar-sensor').on('mouseenter', () => sidebar.show());

  function setupNavbar() {
    const navContainer = $("#dynamicNavLinks");
    navContainer.empty();

    if (userRole === "ADMIN") {
      $("#navRoleLabel").text("(Admin)");
      navContainer.append(`
        <li><a href="admin-dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-3"></i> Admin Dashboard</a></li>
        <li><a href="music-management.html" class="nav-link"><i class="bi bi-music-note-beamed me-3"></i> Manage Music</a></li>
        <li><a href="artist-management.html" class="nav-link"><i class="bi bi-mic me-3"></i> Manage Artists</a></li>
        <li><a href="user-management.html" class="nav-link"><i class="bi bi-people me-3"></i> User Directory</a></li>
        <li><a href="user-profile.html" class="nav-link active-nav"><i class="bi bi-person-circle me-3"></i> My Profile</a></li>
      `);
    } else {
      $("#navRoleLabel").text("(Listener)");
      navContainer.append(`
        <li><a class="nav-link" href="user-home.html"><i class="bi bi-house me-3"></i> Home</a></li>
        <li><a class="nav-link" href="search-page.html"><i class="bi bi-search me-3"></i> Search Music</a></li>
        <li><a class="nav-link" href="artists-page.html"><i class="bi bi-mic me-3"></i> Artists</a></li>
        <li><a class="nav-link" href="user-playlists.html"><i class="bi bi-collection me-3"></i> My Playlists</a></li>
        <li><a class="nav-link active-nav" href="user-profile.html"><i class="bi bi-person-circle me-3"></i> Profile Settings</a></li>
      `);
    }
  }

  function loadUser() {
    $.get(`http://localhost:8080/api/v1/user/get/${userId}`, function(res) {
      const u = res.data;
      $("#username").val(u.username);
      $("#email").val(u.email);
      $("#role").val(u.role);

      $("#displayUsername").text(u.username);
      $("#displayEmail").text(u.email);
      $("#displayRoleBadge").text(u.role);
      $("#avatarCircle").text(u.username.charAt(0).toUpperCase());
    }).fail(() => logout());
  }

  function updateUser() {
    const data = {
      id: userId,
      username: $("#username").val(),
      email: $("#email").val(),
      role: $("#role").val()
    };

    $.ajax({
      url: "http://localhost:8080/api/v1/user/update",
      type: "PUT",
      contentType: "application/json",
      data: JSON.stringify(data),
      success: function() {
        alert("Settings saved successfully!");
        loadUser();
      },
      error: (xhr) => alert(xhr.responseJSON?.message || "Update failed")
    });
  }

  function deleteAccount() {
    if(!confirm("Warning: This will permanently delete your HarmoniQ account. Continue?")) return;
    $.ajax({
      url: "http://localhost:8080/api/v1/user/delete/" + userId,
      type: "DELETE",
      success: () => {
        alert("Your account has been removed.");
        logout();
      }
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = "sign-in.html";
  }

  $(document).ready(() => {
    setupNavbar();
    loadUser();
  });
</script>

</body>
</html>
