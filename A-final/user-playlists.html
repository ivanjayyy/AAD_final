<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Playlists</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --primary-accent: #0d6efd;
            --border-color: #dee2e6;
            --nav-hover: #f1f3f5;
            --gradient-start: #6a11cb;
            --gradient-end: #2575fc;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --primary-accent: #d63384;
            --border-color: #333333;
            --nav-hover: #1e1e1e;
            --gradient-start: #d63384;
            --gradient-end: #712cf9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .cursor-pointer { cursor: pointer; }

        /* Modern Playlist Card Styling */
        .playlist-card {
            background: var(--card-bg) !important;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color) !important;
            position: relative;
            overflow: hidden;
            color: var(--text-main);
        }

        .playlist-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important;
            border-color: var(--primary-accent) !important;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px auto;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .playlist-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        /* Sidebar & Nav */
        .sidebar-sensor { width: 15px; z-index: 1060; }
        .offcanvas { background-color: var(--card-bg) !important; color: var(--text-main); }
        .nav-link { color: var(--text-main) !important; }
        .nav-link:hover { background-color: var(--nav-hover); border-radius: 8px; }

        /* Modal */
        .modal-content { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); }
        .form-control { background-color: var(--nav-hover); border: none; color: var(--text-main); }
        .form-control:focus { background-color: var(--nav-hover); color: var(--text-main); box-shadow: none; }

        #theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 8px 15px; border-radius: 50px; border: none;
            background: var(--primary-accent); color: white; font-weight: bold;
        }

        .text-primary { color: var(--primary-accent) !important; }
        .btn-primary { background-color: var(--primary-accent); border-color: var(--primary-accent); }
    </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
<div id="sidebar-sensor" class="position-fixed top-0 start-0 vh-100 sidebar-sensor"></div>

<div class="offcanvas offcanvas-start border-end shadow" tabindex="-1" id="navSidebar" style="width: 280px;">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title text-primary fw-bold">HarmoniQ 🎶</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" id="closeSidebarBtn"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
        <ul class="nav flex-column mb-auto">
            <li><a class="nav-link p-3" href="user-home.html">🏠 Home</a></li>
            <li><a class="nav-link p-3" href="search-page.html">🔍 Search</a></li>
            <li><a class="nav-link p-3" href="artists-page.html">🎙️ Artists</a></li>
            <li><a class="nav-link p-3 fw-bold text-primary bg-light rounded" href="user-playlists.html">📜 Playlists</a></li>
            <li><a class="nav-link p-3" href="user-profile.html">👤 Profile</a></li>
        </ul>
        <div class="p-3 border-top mt-auto">
            <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">My Library</h2>
            <p class="text-muted small">Your curated music collections</p>
        </div>
        <button class="btn btn-primary fw-bold px-4 rounded-pill shadow-sm" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-circle-fill me-2"></i>Create New
        </button>
    </div>

    <hr class="mb-5 opacity-25">

    <div id="playlistContainer" class="row g-4">
    </div>
</div>

<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="closeModalBtn"></button>
            </div>
            <div class="modal-body p-4 text-center">
                <i class="bi bi-music-note-beamed text-primary display-4 mb-3"></i>
                <h4 class="fw-bold mb-3">Name your playlist</h4>
                <div class="mb-4">
                    <input type="text" id="playlistName" class="form-control form-control-lg text-center" placeholder="e.g. Late Night Vibes">
                </div>
                <button class="btn btn-primary btn-lg w-100 fw-bold rounded-pill py-3" onclick="createPlaylist()">Create Playlist</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- Theme Control ---
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        const btn = document.getElementById('theme-toggle');
        btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';

        const closeBtn = document.getElementById('closeSidebarBtn');
        const modalClose = document.getElementById('closeModalBtn');
        if(theme === 'dark') {
            closeBtn?.classList.add('btn-close-white');
            modalClose?.classList.add('btn-close-white');
        } else {
            closeBtn?.classList.remove('btn-close-white');
            modalClose?.classList.remove('btn-close-white');
        }
    }

    function toggleTheme() {
        applyTheme(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark');
    }

    (function() {
        applyTheme(localStorage.getItem('theme') || 'light');
    })();

    // --- Core logic ---
    const apiBase = "http://localhost:8080/api/v1/playlist";
    const token = localStorage.getItem("token");
    const payload = JSON.parse(atob(token.split('.')[1]));
    const username = payload.sub;
    const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));

    $('#sidebar-sensor').on('mouseenter', () => { if(window.innerWidth > 768) sidebar.show(); });

    function loadPlaylists(){
        $.ajax({
            url: `${apiBase}/load/${username}`,
            headers: { "Authorization": "Bearer " + token },
            success: function(response){
                const container = $("#playlistContainer");
                container.empty();

                if(!response.data || response.data.length === 0) {
                    container.html(`
                        <div class="col-12 text-center py-5">
                            <i class="bi bi-music-note-list display-1 text-muted opacity-25"></i>
                            <p class="text-muted mt-3">Start your journey by creating a playlist.</p>
                        </div>
                    `);
                    return;
                }

                response.data.forEach(pl => {
                    container.append(`
                        <div class="col-6 col-md-4 col-lg-3 col-xl-2">
                            <div class="card h-100 p-4 playlist-card text-center cursor-pointer"
                                 onclick="openPlaylist(${pl.id}, '${pl.playlistName}')">
                                <div class="icon-box">
                                    <i class="bi bi-music-note-list"></i>
                                </div>
                                <div class="fw-bold text-truncate small mb-1">${pl.playlistName}</div>
                                <div class="text-muted" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;">Playlist</div>
                            </div>
                        </div>
                    `);
                });
            }
        });
    }

    function openPlaylist(id, name) {
        localStorage.setItem("selectedPlaylistId", id);
        localStorage.setItem("selectedPlaylistName", name);
        window.location.href = "user-playlist-songs.html";
    }

    function createPlaylist(){
        const name = $("#playlistName").val();
        if(!name) return;

        $.ajax({
            url: `${apiBase}/create`,
            method: 'POST',
            contentType: 'application/json',
            headers: { "Authorization": "Bearer " + token },
            data: JSON.stringify({ "playlistName": name, "username": username }),
            success: function () {
                $("#playlistName").val('');
                bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                loadPlaylists();
            }
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = "sign-in.html";
    }

    $(document).ready(() => loadPlaylists());
</script>

</body>
</html>
