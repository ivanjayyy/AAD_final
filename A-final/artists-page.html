<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Artists</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary-blue: #0061ff;
            --soft-blue: #eef4ff;
            --dark-text: #1e293b;
            --light-text: #64748b;
        }

        body {
            background-color: #f8fafc;
            color: var(--dark-text);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Sidebar Styling */
        .sidebar-sensor { width: 12px; z-index: 1060; cursor: pointer; }
        .offcanvas { border: none !important; border-radius: 0 20px 20px 0; }
        .nav-link {
            border-radius: 12px;
            margin: 4px 15px;
            padding: 12px 16px !important;
            transition: 0.2s;
            color: var(--light-text) !important;
            font-weight: 500;
        }
        .nav-link:hover {
            background-color: var(--soft-blue);
            color: var(--primary-blue) !important;
            transform: translateX(5px);
        }
        .nav-link.active-page {
            background-color: var(--primary-blue);
            color: white !important;
            box-shadow: 0 4px 12px rgba(0, 97, 255, 0.2);
        }

        /* Artist Card Refinement */
        .artist-card {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0,0,0,0.04) !important;
            border-radius: 24px;
            background: #fff;
            overflow: hidden;
        }
        .artist-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06) !important;
            border-color: var(--primary-blue) !important;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }
        .artist-card:hover .profile-img {
            transform: scale(1.05);
        }
        .bio-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.85rem;
            color: var(--light-text);
            line-height: 1.6;
        }

        .view-btn {
            background: var(--soft-blue);
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: none;
            transition: 0.2s;
        }
        .artist-card:hover .view-btn {
            background: var(--primary-blue);
            color: white;
        }
    </style>
</head>

<body class="overflow-x-hidden" style="padding-bottom: 80px;">

<div id="sidebar-sensor" class="position-fixed top-0 start-0 vh-100 sidebar-sensor"></div>

<div class="offcanvas offcanvas-start bg-white shadow-lg" tabindex="-1" id="navSidebar" style="width: 280px;">
    <div class="offcanvas-header py-4 px-4">
        <h5 class="offcanvas-title text-primary fw-bold d-flex align-items-center">
            <span class="p-2 bg-primary text-white rounded-3 me-2" style="line-height: 1;">
                <i class="bi bi-waveform"></i>
            </span>
            HarmoniQ
        </h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0 pt-2">
        <ul class="nav flex-column mb-auto">
            <li><a class="nav-link" href="user-home.html"><i class="bi bi-house-door-fill me-3"></i> Home</a></li>
            <li><a class="nav-link" href="search-page.html"><i class="bi bi-search me-3"></i> Search</a></li>
            <li><a class="nav-link active-page" href="artists-page.html"><i class="bi bi-mic-fill me-3"></i> Artists</a></li>
            <li><a class="nav-link" href="user-playlists.html"><i class="bi bi-collection-play-fill me-3"></i> Playlists</a></li>
            <li><a class="nav-link" href="user-profile.html"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
        </ul>
        <div class="p-4 mt-auto border-top">
            <button class="btn btn-outline-danger w-100 fw-bold border-2" onclick="logout()">
                <i class="bi bi-box-arrow-left me-2"></i> Logout
            </button>
        </div>
    </div>
</div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <h1 class="fw-bold tracking-tight mb-1">Featured Artists</h1>
            <p class="text-muted mb-0">Discover the creative minds behind your favorite sounds.</p>
        </div>
    </div>

    <div class="row g-4" id="artistContainer">
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));
    const apiBase = "http://localhost:8080/api/v1/artist";

    $('#sidebar-sensor').on('mouseenter', () => sidebar.show());

    function fetchArtists() {
        $.ajax({
            url: `${apiBase}/get-all`,
            type: "GET",
            headers: {
                "Authorization": "Bearer " + localStorage.getItem("token")
            },
            success: function(response) {
                renderArtists(response.data);
            },
            error: function() {
                // Professional mock fallback
                const mockData = [
                    { id: 1, name: "Luna Ray", bio: "Indie pop sensation from the northern lights. Bringing ethereal vibes to your ears." },
                    { id: 2, name: "Echo Bass", bio: "Electronic producer specializing in deep house and futuristic synth soundscapes." },
                    { id: 3, name: "The Harmonics", bio: "Alternative rock band with a passion for soulful lyrics and heavy riffs." },
                    { id: 4, name: "Solaris", bio: "Ambient synth-wave explorer focusing on celestial textures." }
                ];
                renderArtists(mockData);
            }
        });
    }

    function renderArtists(artists) {
        const container = $("#artistContainer");
        container.empty();

        artists.forEach(artist => {
            const artistData = JSON.stringify(artist).replace(/'/g, "&apos;");

            container.append(`
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card h-100 artist-card shadow-sm text-center p-4"
                     onclick='viewProfile(${artistData})' style="cursor: pointer;">
                    <div class="mb-4">
                        <img src="${apiBase}/profile-pic/${artist.id}"
                             class="rounded-circle profile-img mx-auto"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23eef4ff%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2224%22 fill=%22%230061ff%22%3E${artist.name.charAt(0)}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <h5 class="fw-bold mb-2 text-dark">${artist.name}</h5>
                    <p class="bio-text mb-4 px-2">${artist.bio}</p>
                    <div class="mt-auto">
                        <span class="badge rounded-pill px-4 py-2 view-btn">
                             View Profile
                        </span>
                    </div>
                </div>
            </div>
        `);
        });
    }

    function viewProfile(artist) {
        localStorage.setItem("selectedArtist", JSON.stringify(artist));
        window.location.href = "artist-profile.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "sign-in.html";
    }

    $(document).ready(() => fetchArtists());
</script>

</body>
</html>
