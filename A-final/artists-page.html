<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Artists</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --primary-accent: #198754; /* Green */
            --border-color: #dee2e6;
            --nav-hover: #f1f3f5;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --primary-accent: #d63384; /* Purple */
            --border-color: #333333;
            --nav-hover: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar-sensor { width: 15px; z-index: 1060; cursor: pointer; }

        /* Artist Card Styling */
        .artist-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            background: var(--card-bg);
            color: var(--text-main);
        }
        .artist-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
            border-color: var(--primary-accent);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: var(--nav-hover);
        }

        .bio-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Navigation */
        .nav-link { color: var(--text-main) !important; }
        .nav-link:hover { background-color: var(--nav-hover); border-radius: 8px; }
        .offcanvas { background-color: var(--card-bg) !important; color: var(--text-main); }

        /* Theme Switcher */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            background: var(--primary-accent);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* Mobile Bottom Navigation */
        @media (max-width: 768px) {
            #sidebar-sensor { display: none; }
            .offcanvas { display: none !important; }

            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 65px;
                background-color: var(--card-bg);
                display: flex !important;
                justify-content: space-around;
                align-items: center;
                border-top: 1px solid var(--border-color);
                z-index: 1050;
            }
            .mobile-bottom-nav a { color: var(--text-main); font-size: 1.4rem; text-decoration: none; }
            .mobile-bottom-nav .active { color: var(--primary-accent); }

            main { padding-bottom: 100px !important; }
        }

        .text-primary { color: var(--primary-accent) !important; }
        .badge.bg-primary-subtle {
            background-color: var(--nav-hover) !important;
            color: var(--primary-accent) !important;
            border-color: var(--border-color) !important;
        }
    </style>
</head>

<body class="overflow-x-hidden">

<button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<div id="sidebar-sensor" class="position-fixed top-0 start-0 vh-100 sidebar-sensor"></div>

<div class="offcanvas offcanvas-start border-end shadow" tabindex="-1" id="navSidebar" style="width: 280px;">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title text-primary fw-bold">HarmoniQ 🎶</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" id="closeSidebarBtn"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
        <ul class="nav flex-column mb-auto">
            <li><a class="nav-link p-3 fw-medium" href="user-home.html">🏠 Home</a></li>
            <li><a class="nav-link p-3 fw-medium" href="search-page.html">🔍 Search</a></li>
            <li><a class="nav-link p-3 fw-medium active text-primary" href="artists-page.html">🎙️ Artists</a></li>
            <li><a class="nav-link p-3 fw-medium" href="user-playlists.html">📜 Playlists</a></li>
            <li><a class="nav-link p-3 fw-medium" href="user-profile.html">👤 Profile</a></li>
        </ul>
        <div class="p-3 border-top">
            <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<nav class="mobile-bottom-nav d-none">
    <a href="user-home.html"><i class="bi bi-house-door"></i></a>
    <a href="search-page.html"><i class="bi bi-search"></i></a>
    <a href="artists-page.html" class="active"><i class="bi bi-mic"></i></a>
    <a href="user-playlists.html"><i class="bi bi-collection-play"></i></a>
    <a href="user-profile.html"><i class="bi bi-person"></i></a>
</nav>

<main class="container py-5">
    <div class="mb-5">
        <h2 class="fw-bold mb-0">Featured Artists</h2>
        <p class="text-muted">Discover the voices behind the music</p>
    </div>

    <div class="row g-4" id="artistContainer">
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- Theme Logic ---
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        const btn = document.getElementById('theme-toggle');
        btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';

        const closeBtn = document.getElementById('closeSidebarBtn');
        if(theme === 'dark') closeBtn.classList.add('btn-close-white');
        else closeBtn.classList.remove('btn-close-white');
    }

    function toggleTheme() {
        const currentTheme = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
        applyTheme(currentTheme);
    }

    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);
    })();

    // --- Sidebar Logic ---
    const sidebar = new bootstrap.Offcanvas(document.getElementById('navSidebar'));
    $('#sidebar-sensor').on('mouseenter', () => {
        if (window.innerWidth > 768) sidebar.show();
    });

    // --- Backend Fetching ---
    function fetchArtists() {
        $.ajax({
            url: "http://localhost:8080/api/v1/artist/get-all",
            type: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: function(response) {
                renderArtists(response.data);
            },
            error: function() {
                // Mock data for immediate preview
                const mockData = [
                    { id: 1, name: "Luna Ray", bio: "Indie pop sensation from the northern lights. Bringing ethereal vibes to your ears." },
                    { id: 2, name: "Echo Bass", bio: "Electronic producer specializing in deep house and futuristic synth soundscapes." },
                    { id: 3, name: "The Harmonics", bio: "Alternative rock band with a passion for soulful lyrics and heavy riffs." }
                ];
                renderArtists(mockData);
            }
        });
    }

    function renderArtists(artists) {
        const container = $("#artistContainer");
        container.empty();

        artists.forEach(artist => {
            container.append(`
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card h-100 artist-card text-center p-4"
                     style="cursor: pointer;"
                     onclick="window.location.href='artist-profile.html?id=${artist.id}'">
                    <div class="mb-3">
                        <img src="http://localhost:8080/api/v1/artist/profile-pic/${artist.id}"
                             class="rounded-circle profile-img mx-auto"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23eee%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-family=%22Arial%22 font-size=%2214%22 text-anchor=%22middle%22 fill=%22%23999%22 dy=%22.3em%22%3EArtist%3C/text%3E%3C/svg%3E'"
                             alt="${artist.name}">
                    </div>
                    <h5 class="fw-bold mb-1">${artist.name}</h5>
                    <p class="bio-text mb-3 px-2">${artist.bio}</p>
                    <div class="mt-auto">
                        <span class="badge bg-primary-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-music-note-beamed me-1"></i> View Profile
                        </span>
                    </div>
                </div>
            </div>
        `);
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = "sign-in.html";
    }

    $(document).ready(() => fetchArtists());
</script>

</body>
</html>
