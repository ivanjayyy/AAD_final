<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Liked Songs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary-purple: #6610f2;
            --accent-pink: #f72585;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            background-color: #fcfaff;
            color: #2b2d42;
            padding-bottom: 140px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Vibrant Hero Header */
        .hero-section {
            background: linear-gradient(135deg, #4361ee 0%, var(--primary-purple) 50%, var(--accent-pink) 100%);
            color: white;
            padding: 80px 0 60px 0;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(102, 16, 242, 0.2);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); color: white; transform: translateX(-5px); }

        .hero-icon-box {
            width: 140px;
            height: 140px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* Refined Song List */
        .song-row {
            background: var(--glass-bg);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }
        .song-row:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border-color: #e0e0e0;
        }
        .song-img {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Bottom Player Styling */
        #bottomPlayer {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(0,0,0,0.05) !important;
        }
        #bottomPlayer.active { bottom: 0 !important; }

        .progress { border-radius: 10px; height: 6px !important; background-color: #eee !important; }
        .progress-bar { background: linear-gradient(90deg, #4361ee, var(--primary-purple)) !important; }

        .liked { color: #ef476f !important; animation: pulse 0.4s ease; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .playlist-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .playlist-item:hover { background: #f3f0ff; color: var(--primary-purple); }

        .btn-play-all {
            background: white;
            color: var(--primary-purple);
            border: none;
            font-weight: 700;
            padding: 12px 40px;
            transition: 0.3s;
        }
        .btn-play-all:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container text-center text-md-start">
        <div class="mb-5">
            <a href="user-home.html" class="back-btn"><i class="bi bi-chevron-left"></i> Home</a>
        </div>
        <div class="d-flex flex-column flex-md-row align-items-center align-items-md-end gap-4">
            <div class="hero-icon-box">
                <i class="bi bi-heart-fill text-danger"></i>
            </div>
            <div class="mt-3 mt-md-0">
                <p class="text-uppercase small fw-bold mb-1 tracking-widest opacity-75">Personal Collection</p>
                <h1 class="display-3 fw-bold mb-1">Liked Songs</h1>
                <p id="songCount" class="fs-5 opacity-90 fw-medium">0 tracks</p>
            </div>
        </div>
    </div>
</div>

<main class="container">
    <div class="mb-5 text-center text-md-start">
        <button class="btn btn-play-all rounded-pill shadow-lg" onclick="playAll()">
            <i class="bi bi-play-fill fs-4 me-1"></i> PLAY ALL
        </button>
    </div>

    <div class="row fw-bold text-muted small px-4 mb-3 d-none d-md-flex">
        <div class="col-1">#</div>
        <div class="col-6">TITLE</div>
        <div class="col-4">ARTIST</div>
        <div class="col-1 text-end">ACTION</div>
    </div>

    <div id="likedSongsContainer" class="d-flex flex-column gap-2"></div>
</main>

<div id="bottomPlayer" class="fixed-bottom py-3 px-4 shadow-lg" style="bottom: -160px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1050;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-4 col-md-3 d-flex align-items-center">
                <img id="playerThumbnail" src="" class="rounded-3 shadow-sm me-3" style="width: 56px; height: 56px; object-fit: cover;">
                <div class="overflow-hidden">
                    <div id="playerTitle" class="text-truncate fw-bold mb-0" style="font-size: 0.95rem;">Song Title</div>
                    <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
                </div>
            </div>

            <div class="col-4 col-md-6 text-center">
                <div class="d-flex justify-content-center align-items-center gap-4 mb-2">
                    <i class="bi bi-skip-backward-fill fs-3 cursor-pointer text-dark" onclick="prevSong()"></i>
                    <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer" style="line-height: 1;"></i>
                    <i class="bi bi-skip-forward-fill fs-3 cursor-pointer text-dark" onclick="nextSong()"></i>
                </div>
                <div class="progress" style="cursor: pointer;" onclick="seek(event)">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
                <div class="d-none d-lg-flex align-items-center gap-2 me-2">
                    <i id="volumeIcon" class="bi bi-volume-up text-muted"></i>
                    <input type="range" id="volumeSlider" class="form-range" style="width: 70px;" min="0" max="1" step="0.01" value="1">
                </div>
                <i id="likeBtn" class="bi bi-heart-fill fs-5 cursor-pointer text-danger liked" onclick="likeSong()"></i>
                <i class="bi bi-plus-square fs-5 cursor-pointer text-muted" id="playlistBtn" data-bs-toggle="popover" data-bs-trigger="click"></i>
                <i class="bi bi-x-lg fs-5 text-danger cursor-pointer ms-2" onclick="closePlayer()"></i>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const apiBase = "http://localhost:8080/api/v1";
    const audio = document.getElementById("audioPlayer");
    const token = localStorage.getItem("token");
    const payload = token ? JSON.parse(atob(token.split('.')[1])) : { id: null, sub: "Guest" };
    const userId = payload.id;
    const username = payload.sub;

    let likedSongs = [];
    let currentIndex = -1;

    $.ajaxSetup({
        beforeSend: function(xhr) {
            if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
    });

    $(document).ready(function() {
        if (!userId) { window.location.href = "sign-in.html"; return; }
        fetchLikedSongs();
        initPlaylistPopover();
    });

    function fetchLikedSongs() {
        $.get(`${apiBase}/liked-song/get-by-user/${userId}`, (response) => {
            likedSongs = response.data || [];
            $("#songCount").text(`${likedSongs.length} tracks`);
            renderSongs();
        });
    }

    function initPlaylistPopover() {
        const playlistBtn = document.getElementById('playlistBtn');
        new bootstrap.Popover(playlistBtn, {
            html: true,
            sanitize: false,
            placement: 'top',
            content: function() {
                return `<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>`;
            }
        });

        playlistBtn.addEventListener('shown.bs.popover', function () {
            $.get(`${apiBase}/playlist/load/${username}`, (response) => {
                let html = '<div class="list-group list-group-flush" style="width: 220px; max-height: 250px; overflow-y: auto;">';
                if(!response.data || response.data.length === 0) {
                    html += '<div class="p-3 text-muted small text-center">No playlists found</div>';
                } else {
                    response.data.forEach(pl => {
                        html += `<div class="playlist-item" onclick="addToPlaylist(${pl.id})">${pl.playlistName}</div>`;
                    });
                }
                html += '</div>';
                const popoverBody = document.querySelector('.popover-body');
                if (popoverBody) popoverBody.innerHTML = html;
            });
        });
    }

    function addToPlaylist(playlistId) {
        if (currentIndex === -1) return alert("Select a song first!");
        const musicId = likedSongs[currentIndex].id;
        $.ajax({
            url: `${apiBase}/playlist-song/add`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ playlistId: playlistId, musicId: musicId }),
            success: function() {
                alert("Collection updated! 🎶");
                bootstrap.Popover.getInstance(document.getElementById('playlistBtn')).hide();
            }
        });
    }

    $('#volumeSlider').on('input', function() {
        const vol = $(this).val();
        audio.volume = vol;
    });

    function renderSongs() {
        const container = $("#likedSongsContainer");
        container.empty();
        if(likedSongs.length === 0) {
            container.html('<div class="text-center py-5"><i class="bi bi-heart fs-1 text-muted opacity-25 d-block mb-3"></i><p class="text-muted">Your favorites list is empty.</p></div>');
            return;
        }
        likedSongs.forEach((song, index) => {
            container.append(`
                <div class="song-row d-flex align-items-center p-3" onclick="playSong(${index})">
                    <div class="col-1 text-muted fw-bold small">${index + 1}</div>
                    <div class="col-6 d-flex align-items-center">
                        <img src="${apiBase}/music/thumbnail/${song.id}" class="song-img me-3">
                        <div class="overflow-hidden">
                            <div class="fw-bold text-truncate">${song.musicTitle}</div>
                            <div class="d-md-none text-muted small">${song.musicArtist}</div>
                        </div>
                    </div>
                    <div class="col-4 text-muted d-none d-md-block">${song.musicArtist}</div>
                    <div class="col-1 text-end text-primary fs-4">
                        <i class="bi bi-play-circle-fill"></i>
                    </div>
                </div>
            `);
        });
    }

    function playSong(index) {
        if (index < 0 || index >= likedSongs.length) return;
        currentIndex = index;
        const song = likedSongs[index];
        audio.src = `${apiBase}/music/stream/${song.id}`;
        $("#playerTitle").text(song.musicTitle);
        $("#playerArtist").text(song.musicArtist);
        $("#playerThumbnail").attr("src", `${apiBase}/music/thumbnail/${song.id}`);
        $("#bottomPlayer").addClass("active");
        audio.play();
        $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill");
    }

    function playAll() { if (likedSongs.length > 0) playSong(0); }
    function nextSong() { playSong((currentIndex + 1) % likedSongs.length); }
    function prevSong() { playSong((currentIndex - 1 + likedSongs.length) % likedSongs.length); }

    function likeSong() {
        if (currentIndex === -1) return;
        $.ajax({
            url: `${apiBase}/liked-song/add-or-remove`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ userId: userId, musicId: likedSongs[currentIndex].id }),
            success: () => { fetchLikedSongs(); closePlayer(); }
        });
    }

    $("#playPauseBtn").on("click", () => {
        if(audio.paused) { audio.play(); $("#playPauseBtn").removeClass("bi-play-circle-fill").addClass("bi-pause-circle-fill"); }
        else { audio.pause(); $("#playPauseBtn").removeClass("bi-pause-circle-fill").addClass("bi-play-circle-fill"); }
    });

    audio.ontimeupdate = () => {
        if(audio.duration) $("#progressBar").css("width", (audio.currentTime / audio.duration * 100) + "%");
    };

    function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
    function closePlayer() { audio.pause(); $("#bottomPlayer").removeClass("active"); }
    audio.onended = () => nextSong();
</script>
</body>
</html>
