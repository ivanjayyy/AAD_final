<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Artist Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    :root {
      --primary-blue: #0d6efd;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      background-color: #f8fafc;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      padding-bottom: 120px;
    }

    /* Modernized Header */
    .profile-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 80px 0 60px 0;
      margin-bottom: 40px;
      border-radius: 0 0 40px 40px;
      position: relative;
      overflow: hidden;
    }

    /* Abstract background glow */
    .profile-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -10%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(13, 110, 253, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .profile-main-img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border: 8px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    /* Song Cards */
    .song-card {
      background: white;
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .song-card:hover {
      background: #fff;
      transform: translateX(8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      border-color: var(--primary-blue);
    }

    .song-thumb {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 12px;
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      font-weight: 500;
      z-index: 10;
      transition: 0.3s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* Glassmorphism Player */
    #bottomPlayer {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.3) !important;
      bottom: -160px;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }
    #bottomPlayer.active { bottom: 0 !important; }

    .progress { height: 6px !important; border-radius: 10px; overflow: hidden; background: #e2e8f0 !important; border: none !important; }

    /* Follow Button */
    .btn-follow {
      border-radius: 30px;
      padding: 10px 35px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: 0.3s;
      border-width: 2px;
    }

    .playlist-item { padding: 12px 16px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f1f5f9; }
    .playlist-item:hover { background: #f8fafc; color: var(--primary-blue); font-weight: 600; }

    .liked { color: #ef4444 !important; }
  </style>
</head>
<body>

<div class="profile-header text-center position-relative">
  <a href="artists-page.html" class="back-btn"><i class="bi bi-chevron-left me-1"></i> Back to Explorers</a>
  <div class="container position-relative z-1">
    <img id="artistImg" src="" class="rounded-circle profile-main-img mb-4" onerror="this.src='https://via.placeholder.com/200'">
    <h1 id="artistName" class="display-4 fw-800 mb-2">Loading...</h1>
    <p id="artistBio" class="lead opacity-75 mx-auto mb-4" style="max-width: 650px; font-weight: 400;">Artist Biography...</p>

    <button id="followBtn" class="btn btn-outline-light btn-follow" onclick="toggleFollow()">
      <i class="bi bi-plus-lg me-2"></i>Follow
    </button>
  </div>
</div>

<main class="container">
  <div class="d-flex align-items-center mb-4">
    <h3 class="fw-bold mb-0">Popular Releases</h3>
    <div class="ms-3 flex-grow-1 border-bottom opacity-25"></div>
  </div>
  <div id="songContainer" class="d-flex flex-column gap-2"></div>
</main>

<div id="bottomPlayer" class="fixed-bottom py-3 px-4 shadow-lg" z-index: 1050;">
<div class="container">
  <div class="row align-items-center">
    <div class="col-4 col-md-3 d-flex align-items-center">
      <img id="playerThumbnail" src="" class="rounded-3 border me-3" style="width: 55px; height: 55px; object-fit: cover;">
      <div class="overflow-hidden">
        <div id="playerTitle" class="text-truncate fw-bold mb-0" style="font-size: 0.95rem;">Song Title</div>
        <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
      </div>
    </div>
    <div class="col-4 col-md-6 text-center">
      <div class="d-flex justify-content-center align-items-center gap-4 mb-2">
        <i id="shuffleBtn" class="bi bi-shuffle fs-5 cursor-pointer text-muted" onclick="toggleShuffle()"></i>
        <i class="bi bi-skip-start-circle fs-3 cursor-pointer" onclick="prevSong()"></i>
        <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
        <i class="bi bi-skip-end-circle fs-3 cursor-pointer" onclick="nextSong()"></i>
        <i class="bi bi-repeat fs-5 text-muted invisible"></i>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span id="currentTime" class="text-muted small" style="min-width: 35px;">0:00</span>
        <div class="progress flex-grow-1 cursor-pointer" onclick="seek(event)">
          <div id="progressBar" class="progress-bar bg-primary" style="width: 0%"></div>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
      <div class="d-none d-lg-flex align-items-center gap-2 me-3">
        <i id="volumeIcon" class="bi bi-volume-up text-muted"></i>
        <input type="range" id="volumeSlider" class="form-range" style="width: 70px;" min="0" max="1" step="0.01" value="1">
      </div>
      <i id="likeBtn" class="bi bi-heart fs-5 cursor-pointer text-muted" onclick="likeSong()"></i>
      <i class="bi bi-plus-square fs-5 cursor-pointer text-muted" id="playlistBtn" data-bs-toggle="popover" data-bs-trigger="click"></i>
      <i class="bi bi-x-circle fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
    </div>
  </div>
</div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Logic remains identical to yours but cleaned up for Authorization consistency
  const apiBase = "http://localhost:8080/api/v1";
  const audio = document.getElementById("audioPlayer");
  const token = localStorage.getItem("token");
  const payload = token ? JSON.parse(atob(token.split('.')[1])) : { sub: "Guest", id: null };
  const userId = payload.id;

  let currentArtistId = null;
  let artistSongs = [];
  let shuffledList = [];
  let shuffleMode = false;
  let currentMusicId = null;
  let currentIndex = -1;

  $.ajaxSetup({
    headers: { 'Authorization': 'Bearer ' + token }
  });

  $(document).ready(function() {
    if (!token) window.location.href = "sign-in.html";

    const artistData = localStorage.getItem("selectedArtist");
    if (!artistData) {
      window.location.href = "artists-page.html";
      return;
    }

    const artist = JSON.parse(artistData);
    currentArtistId = artist.id;

    $("#artistName").text(artist.name);
    $("#artistBio").text(artist.bio);
    $("#artistImg").attr("src", `${apiBase}/artist/profile-pic/${artist.id}`);
    document.title = `HarmoniQ | ${artist.name}`;

    fetchArtistSongs(artist.id, artist.name);
    checkFollowStatus();
    initPlaylistPopover();
  });

  // ... (rest of your logic functions: playSong, toggleFollow, etc.)
</script>

</body>
</html>
