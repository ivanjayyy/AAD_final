<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HarmoniQ | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --primary-accent: #198754; /* Green */
            --border-color: #dee2e6;
            --nav-hover: #f1f3f5;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --primary-accent: #d63384; /* Purple */
            --border-color: #333333;
            --nav-hover: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar-sensor { width: 15px; z-index: 1040; cursor: pointer; }

        /* Card Styling */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        /* Navigation */
        .nav-link { color: var(--text-main) !important; }
        .nav-link:hover { background-color: var(--nav-hover); border-radius: 8px; }
        .offcanvas { background-color: var(--card-bg) !important; color: var(--text-main); }

        /* Fixed Theme Switcher */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            background: var(--primary-accent);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #sidebar-sensor { display: none; }
            .offcanvas { display: none !important; }

            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 65px;
                background-color: var(--card-bg);
                display: flex !important;
                justify-content: space-around;
                align-items: center;
                border-top: 1px solid var(--border-color);
                z-index: 1050;
            }

            .mobile-bottom-nav a {
                color: var(--text-main);
                font-size: 1.4rem;
                text-decoration: none;
            }

            /* Logic for the Streaming Bar to sit ABOVE nav */
            .streaming-bar {
                position: fixed;
                bottom: 65px !important;
                left: 0;
                width: 100%;
                z-index: 1049;
            }

            main { padding-bottom: 90px !important; }
        }

        .text-primary { color: var(--primary-accent) !important; }
        .badge.bg-primary-subtle { background-color: var(--nav-hover) !important; color: var(--primary-accent) !important; border-color: var(--border-color) !important; }
    </style>
</head>

<body class="overflow-hidden">

<button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<div id="sidebar-sensor" class="sidebar-sensor position-fixed top-0 start-0 vh-100"></div>

<div class="offcanvas offcanvas-start border-end shadow" tabindex="-1" id="navSidebar" style="width: 260px;">
    <div class="offcanvas-header border-bottom py-3">
        <h5 class="offcanvas-title text-primary fw-bold">HarmoniQ 🎶</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" id="closeSidebarBtn"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column p-0">
        <div class="p-3">
            <ul class="nav flex-column gap-1">
                <li><a class="nav-link p-3 fw-medium" href="user-home.html">🏠 Home</a></li>
                <li><a class="nav-link p-3 fw-medium" href="search-page.html">🔍 Search</a></li>
                <li><a class="nav-link p-3 fw-medium" href="artists-page.html">🎙️ Artists</a></li>
                <li><a class="nav-link p-3 fw-medium" href="user-playlists.html">📜 Playlists</a></li>
                <li><a class="nav-link p-3 fw-medium" href="user-profile.html">👤 Profile</a></li>
            </ul>
        </div>
        <div class="mt-auto p-3 border-top">
            <button class="btn btn-outline-danger w-100 fw-bold" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<nav class="mobile-bottom-nav d-none">
    <a href="user-home.html"><i class="bi bi-house-door"></i></a>
    <a href="search-page.html"><i class="bi bi-search"></i></a>
    <a href="artists-page.html"><i class="bi bi-mic"></i></a>
    <a href="user-playlists.html"><i class="bi bi-collection-play"></i></a>
    <a href="user-profile.html"><i class="bi bi-person"></i></a>
</nav>

<main class="vh-100 overflow-auto p-4">
    <div class="container-fluid">
        <div class="mb-5">
            <span class="badge bg-primary-subtle px-3 py-2 mb-2">TESTING MODE</span>
            <h1 class="fw-bold">Dashboard</h1>
            <p class="text-muted small d-none d-md-block">← Reveal menu by hovering the left edge</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">Library</h5>
                    <p class="text-muted small mb-0">Manage your tracks and albums efficiently.</p>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">Current Activity</h5>
                    <div class="alert alert-light border border-dashed text-center py-4 mb-0" style="background: var(--nav-hover); color: var(--text-muted);">
                        <span class="italic">No music currently playing</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- Theme Logic ---
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        const btn = document.getElementById('theme-toggle');
        btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';

        // Close button color adjustment
        const closeBtn = document.getElementById('closeSidebarBtn');
        if(theme === 'dark') closeBtn.classList.add('btn-close-white');
        else closeBtn.classList.remove('btn-close-white');
    }

    function toggleTheme() {
        const currentTheme = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
        applyTheme(currentTheme);
    }

    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);
    })();

    // --- Sidebar Logic ---
    const myOffcanvas = new bootstrap.Offcanvas(document.getElementById('navSidebar'));
    $('#sidebar-sensor').on('mouseenter', function() {
        if (window.innerWidth > 768) myOffcanvas.show();
    });

    // --- Backend Logic (Untouched) ---
    function logout() {
        localStorage.removeItem("token");
        window.location.href = "sign-in.html";
    }
</script>

</body>
</html>
