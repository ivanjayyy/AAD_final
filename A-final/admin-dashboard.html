<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body { background-color: #f8f9fa; color: #212529; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .nav-link:hover { background-color: #f8f9fa; }
        .sidebar-sensor { width: 15px; z-index: 1060; }
        .stat-card { transition: transform 0.2s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
        .card-icon { font-size: 2rem; opacity: 0.7; }
    </style>
</head>

<body class="p-4">

<div id="admin-sidebar-sensor" class="position-fixed top-0 start-0 vh-100 sidebar-sensor"></div>

<div class="offcanvas offcanvas-start bg-white border-end shadow" tabindex="-1" id="adminSidebar" style="width: 280px;">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title text-primary fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>Admin HQ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
        <ul class="nav flex-column mb-auto">
            <li><a href="admin-dashboard.html" class="nav-link p-3 text-primary fw-bold bg-light rounded"><i class="bi bi-speedometer2 me-3"></i> Dashboard</a></li>
            <li><a href="music-management.html" class="nav-link p-3 text-dark"><i class="bi bi-music-note-beamed me-3"></i> Music Management</a></li>
            <li><a href="artist-management.html" class="nav-link p-3 text-dark"><i class="bi bi-mic me-3"></i> Artists</a></li>
            <li><a href="user-management.html" class="nav-link p-3 text-dark"><i class="bi bi-people me-3"></i> User Directory</a></li>
            <li><a href="user-profile.html" class="nav-link p-3 text-dark"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
        </ul>
        <div class="p-3 border-top mt-auto">
            <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="fw-bold mb-4">Admin Dashboard</h2>

    <!-- Stats Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card stat-card text-center p-3" onclick="window.location.href='music-management.html'">
                <i class="bi bi-music-note-beamed text-primary card-icon mb-2"></i>
                <h6 class="fw-bold mb-1">Total Tracks</h6>
                <h4 id="totalTracks" class="text-dark">0</h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-3" onclick="window.location.href='artist-management.html'">
                <i class="bi bi-mic text-success card-icon mb-2"></i>
                <h6 class="fw-bold mb-1">Total Artists</h6>
                <h4 id="totalArtists" class="text-dark">0</h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-3" onclick="window.location.href='user-management.html'">
                <i class="bi bi-people text-warning card-icon mb-2"></i>
                <h6 class="fw-bold mb-1">Total Users</h6>
                <h4 id="totalUsers" class="text-dark">0</h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-3" onclick="window.location.href='genre-management.html'">
                <i class="bi bi-tags-fill text-danger card-icon mb-2"></i>
                <h6 class="fw-bold mb-1">Total Genres</h6>
                <h4 id="totalGenres" class="text-dark">0</h4>
            </div>
        </div>
    </div>

    <!-- Recent Activity Table -->
    <div class="card border-0 shadow-sm mb-5">
        <div class="card-header bg-white py-3">
            <h6 class="mb-0 text-secondary fw-bold"><i class="bi bi-clock-history me-2"></i> Recent Activity</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="recentActivityTable">
                <thead class="table-light small text-uppercase">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Type</th>
                    <th>Item</th>
                    <th>User</th>
                    <th class="text-end pe-3">Date</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const sidebar = new bootstrap.Offcanvas(document.getElementById('adminSidebar'));
    $('#admin-sidebar-sensor').on('mouseenter', () => sidebar.show());

    if (!localStorage.getItem("token")) {
        window.location.href = "sign-in.html";
    }

    // Fetch stats
    function fetchStats() {
        $.ajax({
            url: "http://localhost:8080/api/v1/music/get-all",
            method: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: (res) => $("#totalTracks").text(res.data.length)
        });

        $.ajax({
            url: "http://localhost:8080/api/v1/artist/get-all",
            method: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: (res) => $("#totalArtists").text(res.data.length)
        });

        $.ajax({
            url: "http://localhost:8080/api/v1/user/get-all",
            method: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: (res) => $("#totalUsers").text(res.data.length)
        });

        $.ajax({
            url: "http://localhost:8080/api/v1/genre/get-all",
            method: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: (res) => $("#totalGenres").text(res.data.length)
        });
    }

    // Fetch recent activity
    function fetchRecentActivity() {
        $.ajax({
            url: "http://localhost:8080/api/v1/activity/recent",
            method: "GET",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
            success: (res) => {
                const tbody = $("#recentActivityTable tbody").empty();
                res.data.forEach(a => {
                    tbody.append(`
          <tr>
            <td class="ps-3 text-muted">#${a.id}</td>
            <td>${a.type}</td>
            <td>${a.item}</td>
            <td>${a.username}</td>
            <td class="text-end pe-3">${new Date(a.date).toLocaleString()}</td>
          </tr>
        `);
                });
            }
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = "sign-in.html";
    }

    $(document).ready(() => {
        fetchStats();
        fetchRecentActivity();
    });
</script>
</body>
</html>
