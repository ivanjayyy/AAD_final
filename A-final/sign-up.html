<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HarmoniQ | Join the Rhythm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    :root {
      --primary-blue: #0061ff;
      --secondary-blue: #60a5fa;
    }

    body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: #1e293b;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .signup-card {
      border: none;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }

    .form-control {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.1);
    }

    .btn-signup {
      background: var(--primary-blue);
      border: none;
      border-radius: 12px;
      padding: 12px;
      transition: 0.3s;
      font-weight: 700;
    }

    .btn-signup:hover {
      background: #0056e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(0, 97, 255, 0.2);
    }

    .brand-icon {
      width: 60px;
      height: 60px;
      background: var(--primary-blue);
      color: white;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      font-size: 1.8rem;
      box-shadow: 0 10px 20px rgba(0, 97, 255, 0.2);
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-7 col-lg-4">

      <div class="card signup-card p-2">
        <div class="card-body p-4 p-md-5">

          <div class="brand-icon">
            <i class="bi bi-vinyl-fill"></i>
          </div>

          <div class="text-center mb-4">
            <h2 class="fw-bold text-dark mb-1">HarmoniQ</h2>
            <p class="text-muted small">Create your account to get started</p>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold text-muted ms-1">Username</label>
            <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                                <i class="bi bi-person text-muted"></i>
                            </span>
              <input type="text" id="username" class="form-control border-start-0" placeholder="johndoe" style="border-radius: 0 12px 12px 0;">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold text-muted ms-1">Email Address</label>
            <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
              <input type="email" id="email" class="form-control border-start-0" placeholder="name@example.com" style="border-radius: 0 12px 12px 0;">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label small fw-bold text-muted ms-1">Password</label>
            <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
              <input type="password" id="password" class="form-control border-start-0" placeholder="••••••••" style="border-radius: 0 12px 12px 0;">
            </div>
          </div>

          <button class="btn btn-primary w-100 btn-signup mb-4" onclick="signUp()">
            Join HarmoniQ
          </button>

          <div class="text-center">
            <p class="small text-muted mb-0">Already part of the community?</p>
            <a href="sign-in.html" class="text-primary text-decoration-none fw-bold small">Sign back in</a>
          </div>

        </div>
      </div>

      <p class="text-center mt-4 text-muted small">&copy; 2026 HarmoniQ Digital Music</p>

    </div>
  </div>
</div>

<script>
  const baseUrl = "http://localhost:8080/api/v1/auth/sign-up";

  function signUp() {
    const username = $('#username').val();
    const password = $('#password').val();
    const email = $('#email').val();
    const role = "ADMIN"; // Maintaining your current logic

    if (!username || !email || !password) {
      alert("Please complete all fields to register.");
      return;
    }

    $.ajax({
      url: baseUrl,
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({
        "username": username,
        "email": email,
        "password": password,
        "role": role
      }),
      success: function (response) {
        if (response.status === 200 || response.status === "SUCCESS") {
          alert("Account created successfully!");
          window.location.href = "sign-in.html";
        }
      },
      error: function(error) {
        const msg = error.responseJSON?.message || "Registration encountered an error.";
        alert(msg);
      }
    });
  }

  // Support 'Enter' key for submission
  $(document).keypress(function(e) {
    if(e.which == 13) signUp();
  });
</script>

</body>
</html>
