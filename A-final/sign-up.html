<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HarmoniQ | Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    /* Theme Variables */
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-main: #212529;
      --text-muted: #6c757d;
      --primary-accent: #198754; /* Green for Light Mode */
      --border-color: #dee2e6;
      --input-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg-color: #000000;
      --card-bg: #121212;
      --text-main: #ffffff;
      --text-muted: #b0b0b0;
      --primary-accent: #d63384; /* Purple for Dark Mode */
      --border-color: #333333;
      --input-bg: #1e1e1e;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s, color 0.3s;
    }

    /* Fixing the visibility issue for labels and muted text in Dark Mode */
    [data-theme="dark"] .form-label,
    [data-theme="dark"] .text-muted,
    [data-theme="dark"] .form-control::placeholder {
      color: var(--text-muted) !important;
    }

    [data-theme="dark"] h2,
    [data-theme="dark"] label {
      color: var(--text-main) !important;
    }

    .card {
      background-color: var(--card-bg) !important;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .form-control {
      background-color: var(--input-bg);
      border-color: var(--border-color);
      color: var(--text-main);
    }

    .form-control:focus {
      background-color: var(--input-bg);
      color: var(--text-main);
      border-color: var(--primary-accent);
      box-shadow: 0 0 0 0.25rem rgba(214, 51, 132, 0.25);
    }

    .text-primary { color: var(--primary-accent) !important; }
    .btn-primary {
      background-color: var(--primary-accent);
      border-color: var(--primary-accent);
      color: white !important;
    }
    .btn-primary:hover { filter: brightness(90%); }

    /* Fixed Theme Switcher */
    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 10px 15px;
      border-radius: 50px;
      border: none;
      background: var(--primary-accent);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      font-weight: bold;
    }

    /* Mobile Responsiveness for Nav (Future Use) */
    @media (max-width: 768px) {
      .side-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 60px;
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-around;
        align-items: center;
        background: var(--card-bg);
        border-top: 1px solid var(--border-color);
        z-index: 1000;
      }
      .side-nav .nav-link span { display: none; }

      .streaming-bar {
        bottom: 60px !important;
      }
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<button id="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">

      <div class="card rounded-3">
        <div class="card-body p-4 p-md-5">

          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary mb-1">HarmoniQ 🎶</h2>
            <p class="text-muted small">Create your account</p>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username">
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com">
          </div>

          <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
          </div>

          <button class="btn btn-primary w-100 fw-bold py-2 mb-3" onclick="signUp()">
            Sign Up
          </button>

          <div class="text-center">
            <small class="text-muted">Already have an account?
              <a href="sign-in.html" class="text-primary text-decoration-none fw-bold">Sign In</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const btn = document.getElementById('theme-toggle');
    btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
  }

  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
    applyTheme(currentTheme);
  }

  (function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);
  })();

  const baseUrl = "http://localhost:8080/api/v1/auth/sign-up";

  function signUp() {
    const username = $('#username').val();
    const password = $('#password').val();
    const email = $('#email').val();
    const role = "USER";

    if (!username || !email || !password) {
      alert("Please fill all fields");
      return;
    }

    $.ajax({
      url: baseUrl,
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({
        "username": username,
        "email": email,
        "password": password,
        "role": role
      }),
      success: function (response) {
        if (response.status === 200 || response.status === "SUCCESS") {
          alert("Registration successful!");
          window.location.href = "sign-in.html";
        }
      },
      error: function(error) {
        const msg = error.responseJSON?.message || "Registration failed";
        alert(msg);
      }
    });
  }
</script>

</body>
</html>
