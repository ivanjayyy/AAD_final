<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Playlist Songs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --primary-accent: #0d6efd;
            --border-color: #dee2e6;
            --nav-hover: #f1f3f5;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --primary-accent: #d63384;
            --border-color: #333333;
            --nav-hover: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .main-wrapper { display: flex; min-height: 100vh; }
        .content-area { flex: 1; padding: 2.5rem; margin-right: 320px; transition: 0.3s; }

        .right-sidebar {
            width: 320px; position: fixed; right: 0; top: 0; height: 100vh;
            background: var(--card-bg); border-left: 1px solid var(--border-color);
            padding: 2rem 1.5rem; overflow-y: auto; z-index: 1000;
        }

        /* Music Grid */
        .music-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; margin-top: 20px; }
        .music-card {
            background: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center;
            cursor: pointer; transition: 0.3s; border: 1px solid var(--border-color);
        }
        .music-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            border-color: var(--primary-accent);
        }
        .music-thumbnail { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }

        /* Playlist Nav Items */
        .playlist-nav-item {
            padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
        }
        .playlist-nav-item:hover { background-color: var(--nav-hover); color: var(--primary-accent); }
        .playlist-nav-item.active { background-color: var(--primary-accent); color: white; }

        /* Bottom Player */
        #bottomPlayer {
            background-color: var(--card-bg) !important; border-top: 1px solid var(--border-color);
            color: var(--text-main); bottom: -180px; transition: 0.4s ease-in-out; z-index: 1050;
        }
        #bottomPlayer.active { bottom: 0 !important; }
        .progress { background-color: var(--nav-hover) !important; height: 6px; }
        .progress-bar { background-color: var(--primary-accent) !important; }

        #theme-toggle {
            position: fixed; top: 20px; right: 340px; z-index: 1001;
            padding: 8px 15px; border-radius: 50px; border: none;
            background: var(--primary-accent); color: white; font-weight: bold;
        }

        .text-primary { color: var(--primary-accent) !important; }
        .shuffle-active { color: var(--primary-accent) !important; filter: drop-shadow(0 0 5px var(--primary-accent)); }

        @media (max-width: 992px) {
            .right-sidebar { display: none; }
            .content-area { margin-right: 0; }
            #theme-toggle { right: 20px; }
        }
    </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<div class="main-wrapper">
    <div class="content-area">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item"><a href="user-playlists.html" class="text-decoration-none text-muted">My Library</a></li>
                        <li class="breadcrumb-item active text-primary">Playlist</li>
                    </ol>
                </nav>
                <div class="d-flex align-items-center gap-3">
                    <h1 id="activePlaylistName" class="fw-bold display-5 mb-0 text-primary">Loading...</h1>
                    <button class="btn btn-sm btn-outline-danger border-0 mt-2" onclick="deleteCurrentPlaylist()" title="Delete Playlist">
                        <i class="bi bi-trash3 fs-4"></i>
                    </button>
                </div>
                <p id="songCount" class="text-muted mt-1">0 Tracks found</p>
            </div>
            <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" onclick="window.location.href='user-playlists.html'">
                <i class="bi bi-arrow-left me-2"></i>Back
            </button>
        </div>
        <div class="music-container" id="musicContainer"></div>
    </div>

    <div class="right-sidebar shadow-sm">
        <h5 class="fw-bold mb-4 px-2">Your Playlists</h5>
        <div id="sidebarPlaylistList"></div>
    </div>
</div>

<div id="bottomPlayer" class="fixed-bottom py-3 px-4 shadow-lg">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-4 col-md-3 d-flex align-items-center">
                <img id="playerThumbnail" src="" class="rounded border me-3" style="width: 55px; height: 55px; object-fit: cover;">
                <div class="overflow-hidden">
                    <div id="playerTitle" class="text-truncate fw-bold small mb-0">Song Title</div>
                    <div id="playerArtist" class="text-muted text-truncate small">Artist</div>
                </div>
            </div>
            <div class="col-4 col-md-6 text-center">
                <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
                    <i id="shuffleBtn" class="bi bi-shuffle fs-5 cursor-pointer text-muted" title="Shuffle" onclick="toggleShuffle()"></i>
                    <i class="bi bi-skip-start-fill fs-3 cursor-pointer" onclick="prevSong()"></i>
                    <i id="playPauseBtn" class="bi bi-play-circle-fill fs-1 text-primary cursor-pointer"></i>
                    <i class="bi bi-skip-end-fill fs-3 cursor-pointer" onclick="nextSong()"></i>
                    <i class="bi bi-repeat fs-5 text-muted invisible"></i>
                </div>
                <div class="d-flex align-items-center gap-2 px-md-5">
                    <span id="currentTime" class="text-muted" style="font-size: 11px;">0:00</span>
                    <div class="progress flex-grow-1" onclick="seek(event)" style="cursor: pointer;">
                        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="col-4 col-md-3 d-flex align-items-center justify-content-end gap-3">
                <i class="bi bi-bookmark-dash fs-5 cursor-pointer text-danger" title="Remove from playlist" onclick="removeFromCurrentPlaylist()"></i>
                <i class="bi bi-x-lg fs-5 text-danger cursor-pointer" onclick="closePlayer()"></i>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    // --- Theme Logic ---
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        const btn = document.getElementById('theme-toggle');
        btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function toggleTheme() {
        applyTheme(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark');
    }

    (function() {
        applyTheme(localStorage.getItem('theme') || 'light');
    })();

    // --- API & Core logic ---
    const audio = document.getElementById("audioPlayer");
    const musicApi = "http://localhost:8080/api/v1/music";
    const playlistApi = "http://localhost:8080/api/v1/playlist";
    const playlistSongApi = "http://localhost:8080/api/v1/playlist-song";
    const token = localStorage.getItem("token");
    const username = JSON.parse(atob(token.split('.')[1])).sub;

    let currentPlaylistSongs = [];
    let shuffledSongs = [];
    let isShuffle = false;
    let currentPlayingIndex = -1;
    let activePlaylistId = null;

    $(document).ready(function() {
        activePlaylistId = localStorage.getItem("selectedPlaylistId");
        if (!activePlaylistId) { window.location.href = "user-playlists.html"; return; }

        loadSidebarPlaylists(activePlaylistId);
        fetchPlaylistSongs(activePlaylistId, localStorage.getItem("selectedPlaylistName"));
    });

    function loadSidebarPlaylists(activeId) {
        $.ajax({
            url: `${playlistApi}/load/${username}`,
            headers: { "Authorization": "Bearer " + token },
            success: function(response) {
                const list = $("#sidebarPlaylistList").empty();
                response.data.forEach(pl => {
                    const isActive = pl.id == activeId ? 'active' : '';
                    list.append(`
            <div class="playlist-nav-item ${isActive}" onclick="switchPlaylist(${pl.id}, '${pl.playlistName}')">
              <span class="text-truncate small"><i class="bi bi-music-note-list me-2"></i>${pl.playlistName}</span>
              <i class="bi bi-chevron-right small opacity-50"></i>
            </div>
          `);
                });
            }
        });
    }

    function fetchPlaylistSongs(playlistId, playlistName) {
        $("#activePlaylistName").text(playlistName);
        $.ajax({
            url: `${playlistSongApi}/get-all/${playlistId}`,
            headers: { "Authorization": "Bearer " + token },
            success: function(response) {
                currentPlaylistSongs = response.data || [];
                $("#songCount").text(`${currentPlaylistSongs.length} Tracks found`);
                const container = $("#musicContainer").empty();

                if (currentPlaylistSongs.length === 0) {
                    container.html('<div class="col-12 text-center py-5 opacity-50"><i class="bi bi-plus-circle fs-1"></i><p class="mt-2">No tracks added yet.</p></div>');
                    return;
                }

                currentPlaylistSongs.forEach((music, index) => {
                    container.append(`
            <div class="music-card" onclick="playSongFromIndex(${index})">
              <img src="${musicApi}/thumbnail/${music.id}" class="music-thumbnail">
              <div class="text-truncate fw-bold small">${music.musicTitle}</div>
              <div class="text-truncate text-muted" style="font-size: 11px;">${music.musicArtist}</div>
            </div>
          `);
                });
            }
        });
    }

    function playSongFromIndex(index) {
        if (isShuffle) {
            const musicId = currentPlaylistSongs[index].id;
            playSong(shuffledSongs.findIndex(s => s.id === musicId));
        } else {
            playSong(index);
        }
    }

    function playSong(index) {
        const list = isShuffle ? shuffledSongs : currentPlaylistSongs;
        if (index < 0 || index >= list.length) return;

        currentPlayingIndex = index;
        const music = list[index];
        audio.src = `${musicApi}/stream/${music.id}`;
        $("#playerTitle").text(music.musicTitle);
        $("#playerArtist").text(music.musicArtist);
        $("#playerThumbnail").attr("src", `${musicApi}/thumbnail/${music.id}`);
        $("#bottomPlayer").addClass("active");
        audio.play();
        $("#playPauseBtn").attr("class", "bi bi-pause-circle-fill fs-1 text-primary cursor-pointer");
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        if (isShuffle) {
            $("#shuffleBtn").addClass("shuffle-active").removeClass("text-muted");
            shuffledSongs = [...currentPlaylistSongs].sort(() => Math.random() - 0.5);
        } else {
            $("#shuffleBtn").removeClass("shuffle-active").addClass("text-muted");
        }
    }

    function nextSong() { playSong(currentPlayingIndex + 1 >= (isShuffle ? shuffledSongs : currentPlaylistSongs).length ? 0 : currentPlayingIndex + 1); }
    function prevSong() { playSong(currentPlayingIndex - 1 < 0 ? (isShuffle ? shuffledSongs : currentPlaylistSongs).length - 1 : currentPlayingIndex - 1); }

    function switchPlaylist(id, name) {
        localStorage.setItem("selectedPlaylistId", id);
        localStorage.setItem("selectedPlaylistName", name);
        window.location.reload();
    }

    function removeFromCurrentPlaylist() {
        const music = (isShuffle ? shuffledSongs : currentPlaylistSongs)[currentPlayingIndex];
        if (!music || !confirm("Remove this song from the playlist?")) return;

        $.ajax({
            url: `${playlistSongApi}/remove`,
            type: "DELETE",
            headers: { "Authorization": "Bearer " + token },
            contentType: 'application/json',
            data: JSON.stringify({ playlistId: parseInt(activePlaylistId), musicId: parseInt(music.id) }),
            success: function() { fetchPlaylistSongs(activePlaylistId, localStorage.getItem("selectedPlaylistName")); closePlayer(); }
        });
    }

    function deleteCurrentPlaylist() {
        if (!confirm("Delete entire playlist?")) return;
        $.ajax({
            url: `${playlistApi}/delete/${activePlaylistId}`,
            type: "DELETE",
            headers: { "Authorization": "Bearer " + token },
            success: function() { window.location.href = "user-playlists.html"; }
        });
    }

    $("#playPauseBtn").on("click", () => {
        if(audio.paused) { audio.play(); $("#playPauseBtn").attr("class", "bi bi-pause-circle-fill fs-1 text-primary"); }
        else { audio.pause(); $("#playPauseBtn").attr("class", "bi bi-play-circle-fill fs-1 text-primary"); }
    });

    audio.ontimeupdate = () => {
        if(audio.duration) {
            $("#progressBar").css("width", (audio.currentTime / audio.duration) * 100 + "%");
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            $("#currentTime").text(`${mins}:${secs < 10 ? '0' : ''}${secs}`);
        }
    };

    function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
    function closePlayer() { audio.pause(); $("#bottomPlayer").removeClass("active"); }
</script>
</body>
</html>
