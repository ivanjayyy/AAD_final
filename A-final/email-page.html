<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Communication Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary-blue: #0061ff;
            --soft-bg: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--soft-bg);
            color: #1e293b;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .email-container {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 25px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.1);
        }

        .btn-send {
            background-color: var(--primary-blue);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-send:hover {
            background-color: #0052d4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 97, 255, 0.3);
        }

        .back-link {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover { color: var(--primary-blue); }

        /* Animation for the "Sending" state */
        .spinner-grow { width: 1rem; height: 1rem; }
    </style>
</head>
<body>

<div class="container email-container">
    <div class="mb-4">
        <a href="user-management.html" class="back-link">
            <i class="bi bi-arrow-left me-2"></i> Back to User Directory
        </a>
    </div>

    <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
            <h4 class="fw-bold mb-0">Compose Message</h4>
            <span class="badge bg-soft-blue text-primary px-3 py-2 rounded-pill" style="background: #eef4ff;">
                <i class="bi bi-envelope-paper-fill me-2"></i>Admin Dispatch
            </span>
        </div>

        <div class="card-body p-4">
            <form id="emailForm">
                <div class="mb-4">
                    <label for="to" class="form-label">Recipient Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                        <input type="email" class="form-control border-start-0" id="to" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="subject" class="form-label">Subject Line</label>
                    <input type="text" class="form-control" id="subject" placeholder="What is this regarding?" required>
                </div>

                <div class="mb-4">
                    <label for="body" class="form-label">Message Content</label>
                    <textarea class="form-control" id="body" rows="8" placeholder="Type your message here..." required></textarea>
                </div>

                <div id="responseMsg" class="mb-3"></div>

                <button type="submit" class="btn btn-primary btn-send w-100">
                    <i class="bi bi-send-fill me-2"></i> Send Dispatch
                </button>
            </form>
        </div>
    </div>

    <p class="text-center mt-4 text-muted small">
        <i class="bi bi-shield-check me-1"></i> This message will be sent via the <strong>HarmoniQ</strong> official mail server.
    </p>
</div>

<script>
    $(document).ready(function() {
        $('#emailForm').on('submit', function(e) {
            e.preventDefault();

            const emailData = {
                to: $('#to').val(),
                subject: $('#subject').val(),
                body: $('#body').val()
            };

            // Enhanced Loading State
            $('#responseMsg').html(`
                <div class="alert alert-info border-0 shadow-sm d-flex align-items-center">
                    <div class="spinner-grow text-info me-3" role="status"></div>
                    <span>Processing your request...</span>
                </div>
            `);

            $.ajax({
                url: 'http://localhost:8080/api/v1/email/send',
                type: 'POST',
                contentType: 'application/json',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                data: JSON.stringify(emailData),
                success: function(res) {
                    $('#responseMsg').html(`
                        <div class="alert alert-success border-0 shadow-sm">
                            <i class="bi bi-check-circle-fill me-2"></i> Email delivered successfully! Redirecting...
                        </div>
                    `);

                    $('#emailForm')[0].reset();

                    // Delay redirect slightly so user sees success message
                    setTimeout(() => {
                        window.location.href = "user-management.html";
                    }, 1500);
                },
                error: function(xhr) {
                    let errMsg = 'The mail server could not be reached.';
                    try {
                        const err = JSON.parse(xhr.responseText);
                        if (err.message) errMsg = err.message;
                    } catch(e) {}

                    $('#responseMsg').html(`
                        <div class="alert alert-danger border-0 shadow-sm">
                            <i class="bi bi-exclv-triangle-fill me-2"></i> Error: ${errMsg}
                        </div>
                    `);
                }
            });
        });
    });
</script>

</body>
</html>
