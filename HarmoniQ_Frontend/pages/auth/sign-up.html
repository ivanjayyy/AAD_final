<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmoniQ | Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #1a0033, #2e004f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      color: white;
      box-shadow: 0 0 40px rgba(128, 0, 255, 0.4);
    }

    .brand {
      font-size: 28px;
      font-weight: 600;
      color: #c084fc;
      letter-spacing: 1px;
    }

    .form-control {
      background-color: #1c1c1c;
      border: 1px solid #6f42c1;
      color: white;
    }

    .form-control:focus {
      background-color: #1c1c1c;
      color: white;
      border-color: #a855f7;
      box-shadow: 0 0 10px #a855f7;
    }

    .btn-purple {
      background: linear-gradient(45deg, #7b2ff7, #f107a3);
      border: none;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn-purple:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #a855f7;
    }

    a {
      color: #c084fc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="auth-card text-center">
  <div class="brand mb-3">HarmoniQ 🎶</div>
  <h5 class="mb-4">Create Account</h5>

  <div class="mb-3 text-start">
    <label class="form-label">Username</label>
    <input type="text" id="username" class="form-control" placeholder="Choose username">
  </div>

  <div class="mb-3 text-start">
    <label class="form-label">Email</label>
    <input type="email" id="email" class="form-control" placeholder="Add email">
  </div>

  <div class="mb-4 text-start">
    <label class="form-label">Password</label>
    <input type="password" id="password" class="form-control" placeholder="Create password">
  </div>

  <button class="btn btn-purple w-100" onclick="signUp()">Sign Up</button>

  <p class="mt-4 mb-0">
    Do u already have a acc?
    <a href="sign-in.html">Sign In</a>
  </p>
</div>

<script>
  const baseUrl = "http://localhost:8080/api/v1/auth/sign-up";

  function signUp() {
    const username=$('#username').val()
    const password=$('#password').val()
    const email=$('#email').val()
    const role="USER"

    $.ajax({
      url:baseUrl,
      method:'POST',
      contentType:'application/json',

      data:JSON.stringify({
        "username":username,
        "email":email,
        "password":password,
        "role":role
      }),
      success:function (response) {
        if (response.status === 200) {
          console.log(response.status)
          console.log(response.message)
          alert(response.data)
          window.location.href = "sign-in.html";
        }
      },
      error: function(error) {
        const msg = error.responseJSON?.message || "Something went wrong";
        const stts = error.responseJSON?.status
        console.log(stts);
        console.log(msg);
        alert(msg);
      }
    })
  }
</script>
</body>
</html>
