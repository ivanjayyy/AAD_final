<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin User Management</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="p-4">

<h2>Admins</h2>
<table class="table table-bordered" id="adminTable">
    <thead>
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<h2 class="mt-5">Users</h2>
<table class="table table-bordered" id="userTable">
    <thead>
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>


<!-- USER MODAL -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">User Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="modalUserId">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="modalUsername" class="form-control" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" id="modalEmail" class="form-control" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="modalRole" class="form-control">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="updateUser()">Update</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>


<script>

    function fetchUsers(){

        $.ajax({

            url:"http://localhost:8080/api/v1/user/get-all",
            method:"GET",
            contentType:"application/json",

            success:function(response){

                const adminsTbody=$("#adminTable tbody")
                const usersTbody=$("#userTable tbody")

                adminsTbody.empty()
                usersTbody.empty()

                const users=response.data

                users.forEach(user=>{

                    const row=`
<tr>
<td>${user.id}</td>
<td>${user.username}</td>
<td>${user.email}</td>
<td>
<button class="btn btn-sm btn-info" onclick="viewUser('${user.id}')">View</button>
<button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
</td>
</tr>
`

                    if(user.role==="ADMIN"){
                        adminsTbody.append(row)
                    }else{
                        usersTbody.append(row)
                    }

                })

            },

            error:function(err){
                console.log("Error fetching users:",err)
            }

        })

    }



    function viewUser(id){

        $.ajax({

            url:`http://localhost:8080/api/v1/user/get/${id}`,
            type:"GET",

            success:function(response){

                const user=response.data

                $("#modalUserId").val(user.id)
                $("#modalUsername").val(user.username)
                $("#modalEmail").val(user.email)
                $("#modalRole").val(user.role)

                const modal=new bootstrap.Modal(document.getElementById("userModal"))
                modal.show()

            },

            error:function(err){
                console.log(err)
                alert("Failed to load profile")
            }

        })

    }



    function updateUser(){

        const id=$("#modalUserId").val()
        const role=$("#modalRole").val()

        $.ajax({

            url:`http://localhost:8080/api/v1/user/update-role/${id}`,
            type:"PUT",
            contentType:"application/json",

            data:JSON.stringify({
                role:role
            }),

            success:function(response){

                alert(response.message || "User role updated")
                console.log(response.status)
                console.log(response.message)

                const modal=bootstrap.Modal.getInstance(document.getElementById("userModal"))
                modal.hide()

                fetchUsers()

            },

            error:function(err){
                console.log(err)
                alert("Update failed")
            }

        })

    }



    function deleteUser(id){

        if(!confirm("Are you sure you want to delete this user?")) return

        $.ajax({

            url:`http://localhost:8080/api/v1/user/delete/${id}`,
            type:"DELETE",

            success:function(response){

                alert(response.message || "User deleted")
                fetchUsers()

            },

            error:function(err){
                console.log(err)
                alert("Delete failed")
            }

        })

    }



    $(document).ready(function(){
        fetchUsers()
    })

</script>

</body>
</html>
