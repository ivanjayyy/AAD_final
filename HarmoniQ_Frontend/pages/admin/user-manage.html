<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin User Management</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-4">

<h2>Admins</h2>
<table class="table table-bordered" id="adminTable">
    <thead>
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Admins will be populated here -->
    </tbody>
</table>

<h2>Users</h2>
<table class="table table-bordered" id="userTable">
    <thead>
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Users will be populated here -->
    </tbody>
</table>

<script>
    function fetchUsers() {
        $.ajax({
            url: "http://localhost:8080/api/v1/user/get-all",
            method: 'GET',
            contentType: 'application/json',
            success: function(response) {
                const adminsTbody = $('#adminTable tbody');
                const usersTbody = $('#userTable tbody');
                adminsTbody.empty();
                usersTbody.empty();

                const users = response.data; // assuming response.data is the user array

                users.forEach(user => {
                    const row = `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="viewUser(${user.id})">View</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    if (user.role === "ADMIN") {
                        adminsTbody.append(row);
                    } else {
                        usersTbody.append(row);
                    }
                });
            },
            error: function(err) {
                console.log("Error fetching users:", err);
            }
        });
    }

    function viewUser(id) {
        alert("View user details for ID: " + id);
        // Optional: implement modal popup to show user info
    }

    function deleteUser(id) {
        if (!confirm("Are you sure you want to delete this user?")) return;

        $.ajax({
            url: `http://localhost:8080/api/v1/user/delete/${id}`,
            type: "DELETE",
            success: function(response) {
                alert(response.message);
                fetchUsers(); // refresh both tables
            },
            error: function(err) {
                alert("Delete failed");
                console.log(err);
            }
        });
    }

    $(document).ready(function() {
        fetchUsers();
    });
</script>

</body>
</html>
