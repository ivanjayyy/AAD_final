<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ Artists Management</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-4">

<!-- Upload Button -->
<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#uploadModal">Add Artist</button>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadModalLabel">Add New Artist</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="musicTitle">Music Title</label>
                <input type="text" id="musicTitle" class="form-control mb-2" placeholder="Music Title">

                <label for="musicArtist">Artist</label>
                <input type="text" id="musicArtist" class="form-control mb-2" placeholder="Music Artist">

                <label for="musicFile">Music File</label>
                <input type="file" id="musicFile" class="form-control mb-2" accept="audio/*">

                <label for="thumbnailFile">Thumbnail</label>
                <input type="file" id="thumbnailFile" class="form-control mb-2" accept="image/*">

                <button class="btn btn-success mt-2" onclick="uploadMusic()">Upload</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
