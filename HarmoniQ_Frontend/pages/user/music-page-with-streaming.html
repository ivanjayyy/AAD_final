<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            margin-bottom: 120px; /* space for bottom player */
        }

        .music-container{
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
            gap:20px;
            padding:20px;
        }

        .music-card{
            background:#1c1c1c;
            border-radius:12px;
            text-align:center;
            cursor:pointer;
            transition: transform 0.2s;
        }

        .music-card:hover{
            transform: scale(1.05);
        }

        .music-thumbnail{
            width:100%;
            aspect-ratio:1/1;
            object-fit:cover;
            border-radius:12px;
            transition: transform 0.5s linear;
        }

        .music-title{
            font-weight:600;
            margin-top:5px;
        }

        .music-artist{
            font-size:14px;
            color:gray;
        }

        .bottom-player{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#1c1c1c;
            padding:10px 20px;
            box-shadow:0 -3px 15px rgba(0,0,0,0.5);
            display:flex;
            align-items:center;
            justify-content:space-between;
            z-index:100;
        }

        .player-info{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .player-thumbnail{
            width:60px;
            height:60px;
            border-radius:50%;
            object-fit:cover;
            transition: transform 1s linear;
        }

        .player-controls{
            display:flex;
            align-items:center;
            gap:10px;
            flex-grow:1;
        }

        .control-btn{
            font-size:1.5rem;
            cursor:pointer;
            color:white;
        }

        .control-btn:hover{
            color:#9d4edd;
        }

        .progress{
            flex-grow:1;
            height:6px;
            background:#333;
            border-radius:3px;
            margin:0 10px;
            overflow:hidden;
        }

        .progress-bar{
            height:6px;
            background:linear-gradient(45deg,#7b2ff7,#9d4edd);
            width:0%;
        }

        .volume-control{
            width:100px;
        }

        .music-card,
        .progress,
        .control-btn,
        #volumeControl {
            cursor: pointer;
        }

        .liked{
            color:#ff4d6d;
        }

    </style>
</head>
<body>

<h3 class="text-center mt-3">Recent Music</h3>
<div class="music-container" id="recentSongContainer"></div>

<h3 class="text-center mt-3">All Music</h3>
<div class="music-container" id="musicContainer"></div>

<!-- Bottom Music Player -->
<div class="bottom-player" id="bottomPlayer">
    <div class="player-info">
        <img id="playerThumbnail" src="" class="player-thumbnail">
        <div>
            <div id="playerTitle">No song playing</div>
            <div id="playerArtist" class="text-muted" style="font-size:12px;">...</div>
        </div>
    </div>

    <div class="player-controls">
        <i id="prevBtn" class="bi bi-skip-backward-fill control-btn" title="Previous"></i>
        <i id="playPauseBtn" class="bi bi-play-circle-fill control-btn"></i>
        <i id="nextBtn" class="bi bi-skip-forward-fill control-btn" title="Next"></i>
        <i id="likeBtn" class="bi bi-heart control-btn" title="Like"></i>
        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <span id="currentTime" style="font-size:12px;">0:00</span>
        <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="1" class="form-range volume-control">
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const audio = document.getElementById("audioPlayer");
    const progressBar = document.getElementById("progressBar");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playerThumbnail = document.getElementById("playerThumbnail");

    let rotateInterval;
    let currentSongIndex = -1;
    let musicList = [];
    let recentSongList = [];

    function fetchMusic(){
        $.ajax({
            url:"http://localhost:8080/api/v1/music/get-all",
            type:"GET",
            success:function(response){
                musicList = response.data;
                const container = $("#musicContainer");
                container.empty();
                musicList.forEach((music, index) => {
                    container.append(`
                    <div class="music-card" onclick="playSong(${index})">
                        <img src="http://localhost:8080/api/v1/music/thumbnail/${music.id}" class="music-thumbnail">
                        <div class="music-title">${music.musicTitle}</div>
                        <div class="music-artist">${music.musicArtist}</div>
                    </div>
                `);
                });
            },
            error:function(err){ console.log(err); }
        });
    }

    function loadRecentSongs(){
        const token = localStorage.getItem("token");
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userId = payload.id;

        $.ajax({
            url:"http://localhost:8080/api/v1/recent-song/load-all/" + userId,
            type:"GET",
            success:function(response){
                recentSongList = response.data;
                const recentSongContainer = $("#recentSongContainer");
                recentSongContainer.empty();
                recentSongList.forEach((music, index) => {
                    recentSongContainer.append(`
                    <div class="music-card" onclick="playSong(${index})">
                        <img src="http://localhost:8080/api/v1/music/thumbnail/${music.id}" class="music-thumbnail">
                        <div class="music-title">${music.musicTitle}</div>
                        <div class="music-artist">${music.musicArtist}</div>
                    </div>
                `);
                });
            },
            error:function(err){ console.log(err); }
        });
    }

    function playSong(index){
        if(index < 0 || index >= musicList.length) return;
        currentSongIndex = index;

        const music = musicList[index];
        audio.src = "http://localhost:8080/api/v1/music/stream/" + music.id;
        audio.load();
        audio.play();

        recentSong();

        $("#playerTitle").text(music.musicTitle);
        $("#playerArtist").text(music.musicArtist);
        playerThumbnail.src = "http://localhost:8080/api/v1/music/thumbnail/" + music.id;

        playPauseBtn.classList.replace("bi-play-circle-fill","bi-pause-circle-fill");

        // Start rotating thumbnail only when playing
        clearInterval(rotateInterval);
        let rotation = 0;
        rotateInterval = setInterval(()=>{
            if(!audio.paused){
                rotation += 1;
                playerThumbnail.style.transform = `rotate(${rotation}deg)`;
            }
        },30);
    }

    // Next / Previous Buttons
    $('#nextBtn').on('click',()=>{ playSong(currentSongIndex+1); });
    $('#prevBtn').on('click',()=>{ playSong(currentSongIndex-1); });

    // Play / Pause
    playPauseBtn.addEventListener('click', ()=>{
        if(audio.paused){
            audio.play();
            playPauseBtn.classList.replace("bi-play-circle-fill","bi-pause-circle-fill");
        } else{
            audio.pause();
            playPauseBtn.classList.replace("bi-pause-circle-fill","bi-play-circle-fill");
        }
    });

    // Volume control
    $('#volumeControl').on("input", function(){ audio.volume = this.value; });

    // Progress bar animation
    audio.addEventListener("timeupdate", ()=>{
        if(audio.duration){
            let percent = (audio.currentTime/audio.duration)*100;
            progressBar.style.width = percent + "%";
            $('#currentTime').text(formatTime(audio.currentTime));
        }
    });

    // Clickable progress bar to seek
    const progressContainer = document.querySelector(".progress");
    progressContainer.addEventListener("click", function(e){
        const width = this.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });

    // Auto-play next song when current ends
    audio.addEventListener('ended', ()=>{
        playSong(currentSongIndex+1);
    });

    function formatTime(time){
        if(!time) return "0:00";
        let min = Math.floor(time/60);
        let sec = Math.floor(time%60);
        return min + ":" + (sec<10?"0"+sec:sec);
    }

    let liked = false;

    $('#likeBtn').on('click', function(){
        if(currentSongIndex === -1){
            alert("No song selected");
            return;
        }

        liked = !liked;

        if(liked){
            $(this).removeClass("bi-heart");
            $(this).addClass("bi-heart-fill liked");
        }else{
            $(this).removeClass("bi-heart-fill liked");
            $(this).addClass("bi-heart");
        }

        likeSong(); // empty function for now
    });

    function likeSong(){
        const token = localStorage.getItem("token");
        const payload = JSON.parse(atob(token.split('.')[1]));

        const userId = payload.id;
        const musicId = musicList[currentSongIndex].id;

        $.ajax({

            url:"http://localhost:8080/api/v1/liked-song/add-or-remove",
            type:"POST",
            contentType:"application/json",

            data: JSON.stringify({
                userId: userId,
                musicId: musicId
            }),

            success:function(response){
                console.log(response.status);
                console.log(response.data);
                alert(response.data);
            },

            error:function(err){
                console.log(err);
                alert("Failed to like song");
            }

        });

    }

    function recentSong(){
        const token = localStorage.getItem("token");
        const payload = JSON.parse(atob(token.split('.')[1]));

        const userId = payload.id;
        const musicId = musicList[currentSongIndex].id;

        $.ajax({

            url:"http://localhost:8080/api/v1/recent-song/add",
            type:"POST",
            contentType:"application/json",

            data: JSON.stringify({
                userId: userId,
                musicId: musicId
            }),

            success:function(response){
                console.log(response.status);
                console.log(response.message);
            },

            error:function(err){
                console.log(err);
                alert("Failed to add Recent Song");
            }

        });

    }

    // Initial fetch of music list
    $(document).ready(function(){
        fetchMusic();
        loadRecentSongs();
    });
</script>
</body>
</html>
