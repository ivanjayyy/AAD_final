<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Test</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2, h3 {
            color: #333;
        }

        /* Folder-style playlist cards */
        .playlist-card {
            width: 120px;
            height: 120px;
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .playlist-card:hover {
            transform: scale(1.05);
            border-color: #adb5bd;
        }

        .playlist-icon {
            font-size: 40px;
            margin-bottom: 8px;
            color: #ffc107;
        }

        /* Overlay */
        #playlistOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        #overlayContent {
            display: flex;
            height: 100%;
            width: 100%;
            color: white;
        }

        /* Sidebar */
        #playlistSidebar {
            width: 250px;
            background-color: #212529;
            padding: 20px;
            overflow-y: auto;
        }

        #playlistSidebar .playlist-item {
            padding: 10px 15px;
            margin-bottom: 10px;
            background-color: #343a40;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #playlistSidebar .playlist-item:hover {
            background-color: #495057;
        }

        /* Main content */
        #playlistMain {
            flex: 1;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Back button */
        #backBtn {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Playlist Management</h2>

    <button class="btn btn-primary mb-3" onclick="openPopup()">New Playlist</button>

    <h3>Your Playlists</h3>
    <div id="playlistContainer" class="d-flex flex-wrap"></div>

</div>

<!-- Overlay -->
<div id="playlistOverlay">
    <div id="overlayContent">
        <div id="playlistSidebar">
            <button id="backBtn" class="btn btn-secondary w-100" onclick="closeOverlay()">Back</button>
            <div id="sidebarPlaylists" class="mt-3"></div>
        </div>
        <div id="playlistMain">
            <h2>Select a playlist from the left</h2>
        </div>
    </div>
</div>

<!-- Popup for creating playlist -->
<div id="popup" class="card p-3" style="display:none; position:absolute; width:250px; top:100px; left:50%; transform:translateX(-50%);">
    <h5>Create Playlist</h5>
    <div class="mb-2">
        <label>Username:</label>
        <input type="text" id="username" class="form-control" readonly>
    </div>
    <div class="mb-2">
        <label>Playlist Name:</label>
        <input type="text" id="playlistName" class="form-control">
    </div>
    <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-primary" onclick="createPlaylist()">Create</button>
        <button class="btn btn-secondary" onclick="closePopup()">Cancel</button>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    const payload = token ? JSON.parse(atob(token.split('.')[1])) : { sub: "Guest" };
    const username = payload.sub;

    loadPlaylists();

    function openPopup(){
        $("#popup").show();
        $("#username").val(username);
    }

    function closePopup(){
        $("#popup").hide();
    }

    function createPlaylist(){
        const playlistName = $("#playlistName").val();

        $.ajax({
            url: "http://localhost:8080/api/v1/playlist/create",
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ "playlistName": playlistName, "username": username }),
            success: function (response) {
                alert(response.message);
                closePopup();
                loadPlaylists();
            },
            error: function (error) {
                alert("create playlist error: " + error.message);
            }
        });
    }

    function loadPlaylists(){
        $.ajax({
            url: "http://localhost:8080/api/v1/playlist/load/" + username,
            method: "GET",
            contentType: 'application/json',
            success: function(playlists){
                const container = $("#playlistContainer");
                container.empty();

                playlists.data.forEach(pl => {
                    const div = $(`
                        <div class="playlist-card">
                            <div class="playlist-icon">📁</div>
                            ${pl.playlistName}
                        </div>
                    `);
                    div.click(()=>openOverlay(playlists.data, pl.id));
                    container.append(div);
                });
            },
            error: function (error) {
                alert("load playlists error: " + error.message);
            }
        });
    }

    function openOverlay(playlists, activeId){
        $("#playlistOverlay").show();
        const sidebar = $("#sidebarPlaylists");
        const main = $("#playlistMain");
        sidebar.empty();
        main.html("<h2>Selected Playlist</h2>");

        playlists.forEach(pl => {
            const item = $(`<div class="playlist-item">${pl.playlistName}</div>`);
            item.click(()=> main.html(`<h2>${pl.playlistName}</h2><p>Here you can show songs in this playlist</p>`));
            sidebar.append(item);

            if(pl.id === activeId){
                main.html(`<h2>${pl.playlistName}</h2><p>Here you can show songs in this playlist</p>`);
            }
        });
    }

    function closeOverlay(){
        $("#playlistOverlay").hide();
    }
</script>

</body>
</html>
