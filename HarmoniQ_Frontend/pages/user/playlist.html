<!DOCTYPE html>
<html>
<head>
    <title>Playlist Test</title>
</head>
<body>

<h2>Playlist Management</h2>

<button onclick="openPopup()">New Playlist</button>

<br><br>

<div id="popup" style="display:none; border:1px solid black; padding:10px; width:250px;">
    <h3>Create Playlist</h3>

    <label>Username:</label><br>
    <input type="text" id="username" readonly>
    <br><br>

    <label>Playlist Name:</label><br>
    <input type="text" id="playlistName">
    <br><br>

    <button onclick="createPlaylist()">Create</button>
    <button onclick="closePopup()">Cancel</button>
</div>

<h3>Your Playlists</h3>
<div id="playlistContainer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    const token = localStorage.getItem("token");
    const payload = JSON.parse(atob(token.split('.')[1]));
    const username = payload.sub;

    loadPlaylists()

    function openPopup(){
        document.getElementById("popup").style.display = "block";

        if(token){
            document.getElementById("username").value = username;
        }
    }

    function closePopup(){
        document.getElementById("popup").style.display = "none";
    }

    function createPlaylist(){
        const playlistName = document.getElementById("playlistName").value
        const username = document.getElementById("username").value

        $.ajax({
            url: "http://localhost:8080/api/v1/playlist/create",
            method: 'POST',
            contentType: 'application/json',

            data: JSON.stringify({
                "playlistName": playlistName,
                "username": username
            }),
            success: function (response) {
                alert(response.message)
                closePopup()
                loadPlaylists()
            },
            error: function (error) {
                alert("create playlist error: " + error.message + "")
            }
        })
    }

    function loadPlaylists(){

        $.ajax({
            url: "http://localhost:8080/api/v1/playlist/load/" + username,
            method: "GET",
            contentType: 'application/json',

            success: function(playlists){
                const container = document.getElementById("playlistContainer")
                container.innerHTML = ""

                playlists.data.forEach(function(playlist){
                    const div = document.createElement("div")

                    div.style.width = "120px"
                    div.style.height = "120px"
                    div.style.border = "1px solid black"
                    div.style.display = "inline-flex"
                    div.style.alignItems = "center"
                    div.style.justifyContent = "center"
                    div.style.margin = "10px"
                    div.style.cursor = "pointer"

                    div.innerText = playlist.playlistName

                    div.onclick = function(){
                        alert("Clicked playlist ID: " + playlist.id)
                    }

                    container.appendChild(div)

                })
            },
            error: function (error) {
                alert("load playlists error: " + error.message + "")
            }
        })
    }

</script>

</body>
</html>
