<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<h2>Stream Music</h2>

<input type="number" id="musicId" placeholder="Enter Music ID">
<button onclick="playMusic()">Play</button>

<br><br>

<audio id="audioPlayer" controls></audio>

<script>
  function playMusic() {

    let id = $('#musicId').val();

    if (!id) {
      alert("Enter music ID");
      return;
    }

    let audio = document.getElementById("audioPlayer");
    audio.src = "http://localhost:8080/api/v1/music/stream/" + id;
    audio.load();
    audio.play();
  }
</script>
</body>
</html>
