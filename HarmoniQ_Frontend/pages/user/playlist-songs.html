<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .music-container{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
      gap:20px;
      padding:20px;
    }

    .music-card{
      background:#1c1c1c;
      border-radius:12px;
      text-align:center;
      cursor:pointer;
      transition: transform 0.2s;
    }

    .music-card:hover{
      transform: scale(1.05);
    }

    .music-thumbnail{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:12px;
      transition: transform 0.5s linear;
    }

    .music-title{
      font-weight:600;
      margin-top:5px;
    }

    .music-artist{
      font-size:14px;
      color:gray;
    }
  </style>
</head>
<body>
<h1>Playlist Songs</h1>
<div class="music-container" id="musicContainer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(document).ready(function(){ fetchMusic(); });

  let musicList = [];
  const playlist_id = 2;

  function fetchMusic(){
    $.ajax({
      url:"http://localhost:8080/api/v1/playlist-song/get-all/" + playlist_id,
      type:"GET",
      success:function(response){
        musicList = response.data;
        const container = $("#musicContainer");
        container.empty();
        musicList.forEach((music, index) => {
          container.append(`
                    <div class="music-card" onclick="playSong(${index})">
                        <img src="http://localhost:8080/api/v1/music/thumbnail/${music.id}" class="music-thumbnail">
                        <div class="music-title">${music.musicTitle}</div>
                        <div class="music-artist">${music.musicArtist}</div>
                    </div>
                `);
        });
      },
      error:function(err){ console.log(err); }
    });
  }
</script>
</body>
</html>
