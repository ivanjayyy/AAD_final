<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ | Stream Music</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #0f0f0f;
            color: white;
        }

        .player-card {
            background-color: #1c1c1c;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
        }

        .btn-purple {
            background: linear-gradient(45deg, #7b2ff7, #9d4edd);
            border: none;
            color: white;
        }

        .btn-purple:hover {
            opacity: 0.9;
        }

        .progress {
            height: 6px;
            background-color: #333;
        }

        .progress-bar {
            background: linear-gradient(45deg, #7b2ff7, #9d4edd);
        }

        .control-btn {
            font-size: 1.5rem;
            cursor: pointer;
            margin: 0 15px;
        }

        .control-btn:hover {
            color: #9d4edd;
        }

        .like-btn {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .liked {
            color: #9d4edd;
        }

        input[type="range"] {
            accent-color: #9d4edd;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="player-card col-md-6 text-center">

        <h3 class="mb-4">🎵 HarmoniQ Player</h3>

        <!-- Music ID Input -->
        <div class="input-group mb-4">
            <input type="number" id="musicId" class="form-control" placeholder="Enter Music ID">
            <button class="btn btn-purple" onclick="playMusic()">Play</button>
        </div>

        <!-- Song Info -->
        <h5 id="songTitle">No song playing</h5>

        <!-- Progress Bar -->
        <div class="progress my-3">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Time Display -->
        <div class="d-flex justify-content-between small">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <!-- Controls -->
        <div class="my-4">
            <i class="bi bi-skip-backward-fill control-btn" onclick="rewind()"></i>
            <i id="playPauseBtn" class="bi bi-play-circle-fill control-btn" onclick="togglePlay()"></i>
            <i class="bi bi-skip-forward-fill control-btn" onclick="forward()"></i>
            <i id="likeBtn" class="bi bi-heart like-btn ms-3" onclick="toggleLike()"></i>
        </div>

        <!-- Volume -->
        <div class="mt-3">
            <label class="small">Volume</label>
            <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="1" class="form-range">
        </div>

        <!-- Hidden Audio -->
        <audio id="audioPlayer"></audio>

    </div>

</div>

<script>

    const audio = document.getElementById("audioPlayer");
    const progressBar = document.getElementById("progressBar");
    const playPauseBtn = document.getElementById("playPauseBtn");

    function playMusic() {
        let id = $('#musicId').val();

        if (!id) {
            alert("Enter music ID");
            return;
        }

        audio.src = "http://localhost:8080/api/v1/music/stream/" + id;
        audio.load();
        audio.play();

        $('#songTitle').text("Playing Song ID: " + id);
        playPauseBtn.classList.remove("bi-play-circle-fill");
        playPauseBtn.classList.add("bi-pause-circle-fill");
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playPauseBtn.classList.replace("bi-play-circle-fill", "bi-pause-circle-fill");
        } else {
            audio.pause();
            playPauseBtn.classList.replace("bi-pause-circle-fill", "bi-play-circle-fill");
        }
    }

    function rewind() {
        audio.currentTime -= 10;
    }

    function forward() {
        audio.currentTime += 10;
    }

    function toggleLike() {
        let likeBtn = $('#likeBtn');
        likeBtn.toggleClass("bi-heart bi-heart-fill liked");

        // optional: call backend to save liked song
        // $.post("http://localhost:8080/api/v1/likes/" + $('#musicId').val());
    }

    audio.addEventListener("timeupdate", function () {
        let percentage = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = percentage + "%";

        $('#currentTime').text(formatTime(audio.currentTime));
        $('#duration').text(formatTime(audio.duration));
    });

    function formatTime(time) {
        if (!time) return "0:00";
        let minutes = Math.floor(time / 60);
        let seconds = Math.floor(time % 60);
        return minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
    }

    $('#volumeControl').on("input", function () {
        audio.volume = this.value;
    });

</script>

</body>
</html>
