<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>User Profile</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background:#f8f9fa;
    }

    .profile-card{
      max-width:450px;
      margin:auto;
      margin-top:80px;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="card profile-card shadow p-4">

    <h4 class="text-center mb-3">My Profile</h4>

    <div class="mb-3">
      <label>Username</label>
      <input type="text" id="username" class="form-control">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
      <label>Role</label>
      <input type="text" id="role" class="form-control" readonly>
    </div>

    <div class="d-grid gap-2">

      <button class="btn btn-primary" onclick="updateUser()">
        Update Profile
      </button>

      <button class="btn btn-danger" onclick="deleteAccount()">
        Delete Account
      </button>

    </div>

  </div>

</div>

<script>

  const token = localStorage.getItem("token")

  if(!token){
    alert("Please login first")
    window.location.href="signin.html"
  }

  const payload = JSON.parse(atob(token.split('.')[1]))
  const id = payload.id

  loadUser()

  function loadUser(){

    $.ajax({

      url:`http://localhost:8080/api/v1/user/get/${id}`,
      type:"GET",

      headers:{
        "Authorization":"Bearer "+token
      },

      success:function(response){

        const user = response.data

        $("#username").val(user.username)
        $("#email").val(user.email)
        $("#role").val(user.role)

      },

      error:function(err){
        console.log(err)
        alert("Failed to load profile")
      }

    })

  }


  function updateUser(){
    const id = payload.id
    const username = $("#username").val()
    const email = $("#email").val()
    const role = $("#role").val()

    $.ajax({

      url:"http://localhost:8080/api/v1/user/update",
      type:"PUT",

      headers:{
        "Authorization":"Bearer "+token
      },

      contentType:"application/json",

      data:JSON.stringify({
        id:id,
        username:username,
        email:email,
        role:role
      }),

      success:function(response){
        alert("Profile updated successfully")
      },

      error:function(err){
        alert("Update failed")
        console.log(err)
      }

    })

  }


  function deleteAccount(){
    const id = payload.id

    if(!confirm("Are you sure you want to delete your account?")){
      return
    }

    $.ajax({

      url:"http://localhost:8080/api/v1/user/delete/" + id,
      type:"DELETE",

      headers:{
        "Authorization":"Bearer "+token
      },

      success:function(response){

        alert("Account deleted")

        localStorage.removeItem("token")

        window.location.href="signin.html"

      },

      error:function(err){
        alert("Delete failed")
      }

    })

  }

</script>

</body>
</html>
