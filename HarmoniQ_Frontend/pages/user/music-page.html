<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ Music</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        /* music grid */
        .music-container{
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap:20px;
        }

        /* music card */
        .music-card{
            background:white;
            border-radius:12px;
            padding:10px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:transform 0.2s;
        }

        .music-card:hover{
            transform:scale(1.05);
        }

        /* square thumbnail */
        .music-thumbnail{
            width:100%;
            aspect-ratio:1/1;
            object-fit:cover;
            border-radius:10px;
        }

        /* title */
        .music-title{
            font-weight:600;
            margin-top:8px;
        }

        /* artist */
        .music-artist{
            font-size:14px;
            color:gray;
        }

    </style>

</head>

<body class="p-4">

<h3 class="mb-4">All Music</h3>

<div class="music-container" id="musicContainer">
</div>

<script>

    function fetchMusic(){

        $.ajax({
            url:"http://localhost:8080/api/v1/music/get-all",
            type:"GET",

            success:function(response){

                const container = $("#musicContainer");
                container.empty();

                response.data.forEach(music => {

                    container.append(`

                <div class="music-card">

                    <img
                        src="http://localhost:8080/api/v1/music/thumbnail/${music.id}"
                        class="music-thumbnail"
                    >

                    <div class="music-title">
                        ${music.musicTitle}
                    </div>

                    <div class="music-artist">
                        ${music.musicArtist}
                    </div>

                </div>

                `);

                });

            },

            error:function(err){
                console.log(err);
            }

        });

    }

    $(document).ready(function(){
        fetchMusic();
    });

</script>

</body>
</html>
