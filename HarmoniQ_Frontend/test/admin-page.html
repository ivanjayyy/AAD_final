<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HarmoniQ Music Management</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-4">

<!-- Upload Button -->
<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#uploadModal">Upload Music</button>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadModalLabel">Upload M4A File</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="musicTitle">Music Title</label>
                <input type="text" id="musicTitle" class="form-control mb-2" placeholder="Music Title">

                <label for="musicArtist">Artist</label>
                <input type="text" id="musicArtist" class="form-control mb-2" placeholder="Music Artist">

                <label for="musicFile">Music File</label>
                <input type="file" id="musicFile" class="form-control mb-2" accept="audio/*">

                <label for="thumbnailFile">Thumbnail</label>
                <input type="file" id="thumbnailFile" class="form-control mb-2" accept="image/*">

                <button class="btn btn-success mt-2" onclick="uploadMusic()">Upload</button>
            </div>
        </div>
    </div>
</div>

<!-- Music Table -->
<h4 class="mt-4">All Music</h4>
<table class="table table-bordered" id="musicTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Artist</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Data will be populated here by AJAX -->
    </tbody>
</table>

<script>
    function uploadMusic() {
        const musicFile = $('#musicFile')[0].files[0];
        const thumbnail = $('#thumbnailFile')[0].files[0];
        const musicTitle = $('#musicTitle').val();
        const musicArtist = $('#musicArtist').val();

        if (!musicFile || !thumbnail || !musicTitle || !musicArtist) {
            alert("Please fill all fields and select files.");
            return;
        }

        let formData = new FormData();
        formData.append("musicFile", musicFile);
        formData.append("thumbnail", thumbnail);
        formData.append("musicTitle", musicTitle);
        formData.append("musicArtist", musicArtist);

        $.ajax({
            url: "http://localhost:8080/api/v1/music/upload",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
                alert("Upload successful!");
                $('#uploadModal').modal('hide');
                fetchMusic(); // refresh table after upload
            },
            error: function (err) {
                alert("Upload failed");
                console.log(err);
            }
        });
    }

    function fetchMusic() {
        $.ajax({
            url: "http://localhost:8080/api/v1/music/get-all",
            type: "GET",
            success: function (response) {
                const tbody = $('#musicTable tbody');
                tbody.empty();
                response.data.forEach(music => {
                    tbody.append(`
                        <tr>
                            <td>${music.id}</td>
                            <td>${music.musicTitle}</td>
                            <td>${music.musicArtist}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="updateMusic(${music.id})">Update</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteMusic(${music.id})">Delete</button>
                            </td>
                        </tr>
                    `);
                });
            },
            error: function(err) {
                console.log(err);
            }
        });
    }

    function updateMusic(id) {
        alert("Update function for ID: " + id);
        // You can implement an update popup later
    }

    function deleteMusic(id) {
        if (!confirm("Are you sure you want to delete this music?")) return;

        $.ajax({
            url: `http://localhost:8080/api/v1/music/delete/${id}`,
            type: "DELETE",
            success: function(response) {
                alert("Deleted successfully!");
                fetchMusic();
            },
            error: function(err) {
                alert("Delete failed");
                console.log(err);
            }
        });
    }

    // Initial fetch on page load
    $(document).ready(function() {
        fetchMusic();
    });
</script>

</body>
</html>
