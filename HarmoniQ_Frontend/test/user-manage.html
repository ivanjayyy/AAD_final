<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin User Management</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-4">

<h2>Admin User Management</h2>

<!-- User Table -->
<table class="table table-bordered" id="userTable">
    <thead>
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Users will be populated here -->
    </tbody>
</table>

<script>
    // Fetch all users from backend
    function fetchUsers() {
        $.ajax({
            url: "http://localhost:8080/api/v1/user/get-all", // adjust if your endpoint is different
            type: "GET",
            success: function(response) {
                const tbody = $('#userTable tbody');
                tbody.empty();

                // If your backend wraps the list in "data", use response.data
                const users = response.data;

                users.forEach(user => {
                    tbody.append(`
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.role}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="viewUser(${user.id})">View</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                            </td>
                        </tr>
                    `);
                });
            },
            error: function(err) {
                console.log("Error fetching users:", err);
            }
        });
    }

    function viewUser(id) {
        alert("View user details for ID: " + id);
        // You can implement a modal popup to show user info
    }

    function deleteUser(id) {
        if (!confirm("Are you sure you want to delete this user?")) return;

        $.ajax({
            url: `http://localhost:8080/api/v1/user/delete/${id}`,
            type: "DELETE",
            success: function(response) {
                alert("User deleted successfully!");
                fetchUsers(); // refresh table
            },
            error: function(err) {
                alert("Delete failed");
                console.log(err);
            }
        });
    }

    // Initial fetch on page load
    $(document).ready(function() {
        fetchUsers();
    });
</script>

</body>
</html>
